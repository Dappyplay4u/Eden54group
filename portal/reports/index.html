<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports Overview · Eden 54 Portal</title>
<link rel="icon" type="image/jpeg" href="/logo/eden 54 logo.jpeg">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/portal/portal.css">
<style>
.dept-card { background:var(--card); border:1px solid var(--border); border-radius:8px; margin-bottom:20px; overflow:hidden; }
.dept-header { display:flex; align-items:center; justify-content:space-between; padding:16px 22px; border-bottom:1px solid var(--border); }
.dept-header-left { display:flex; align-items:center; gap:12px; }
.dept-icon { font-size:1.3rem; }
.dept-title { font-size:0.95rem; font-weight:400; }
.dept-sub { font-size:0.72rem; color:var(--muted); margin-top:2px; }
.dept-body { padding:18px 22px; }
.no-sub { display:flex; align-items:center; gap:8px; color:var(--muted); font-size:0.83rem; padding:6px 0; }
.no-sub::before { content:''; width:8px; height:8px; border-radius:50%; background:#fca5a5; flex-shrink:0; }

.rev-row { display:flex; align-items:flex-start; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:0.84rem; gap:12px; }
.rev-row:last-child { border-bottom:none; }
.rev-total { display:flex; justify-content:space-between; padding:10px 0 0; font-weight:400; font-size:0.9rem; border-top:2px solid var(--border); margin-top:4px; }
.cash-breakdown { font-size:0.72rem; color:var(--muted); margin-top:2px; }

.bar-items { display:flex; flex-wrap:wrap; gap:6px; }
.item-chip { font-size:0.72rem; padding:3px 10px; border-radius:12px; background:#f3f4f6; color:var(--text); }
.item-chip.low { background:#fef3c7; color:#92400e; }

.match-row { display:flex; gap:10px; font-size:0.82rem; padding:6px 0; border-bottom:1px solid var(--border); }
.match-row:last-child { border-bottom:none; }

.sub-label { font-size:0.65rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; margin-top:4px; }

.grand-bar { background:var(--deep); border-radius:8px; padding:18px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:14px; margin-bottom:24px; }
.grand-bar-label { font-size:0.65rem; letter-spacing:0.18em; text-transform:uppercase; color:rgba(245,242,236,0.45); margin-bottom:4px; }
.grand-bar-val { font-size:1.5rem; font-weight:400; color:var(--gold); }
.gt-chips { display:flex; gap:12px; flex-wrap:wrap; }
.gt-chip { font-size:0.75rem; color:rgba(245,242,236,0.55); white-space:nowrap; }
.gt-chip strong { color:rgba(245,242,236,0.9); font-weight:400; }

.pill-status { display:inline-flex; align-items:center; gap:5px; font-size:0.68rem; padding:3px 10px; border-radius:12px; white-space:nowrap; }
.pill-ok   { background:#dcfce7; color:#166534; }
.pill-warn { background:#fef9c3; color:#854d0e; }
.pill-none { background:#f3f4f6; color:#6b7280; }

@media print {
  body { background:#fff !important; }
  .sidebar,.topbar,.hamburger,.sb-overlay,.no-print { display:none !important; }
  .main { margin-left:0 !important; }
  .content { padding:0 !important; }
  .dept-card { box-shadow:none !important; page-break-inside:avoid; }
  .print-header { display:block !important; }
}
.print-header { display:none; text-align:center; margin-bottom:20px; }
</style>
</head>
<body>
<div class="sb-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="sb-brand"><div class="sb-brand-name">Eden 54</div><div class="sb-brand-sub">Staff Portal</div></div>
  <nav class="sb-nav" id="sbNav"></nav>
  <div class="sb-foot">
    <div id="sidebarUser"></div>
    <a class="sb-item" onclick="switchProfile()" style="cursor:pointer"><i class="sb-icon">🔄</i> Switch Profile</a>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="hamburger" onclick="toggleSidebar()"><div></div><div></div><div></div></button>
      <h1>Reports Overview</h1>
    </div>
    <div class="topbar-date" id="topDate"></div>
  </div>
  <div class="content">
    <div id="alertBox" class="alert"></div>

    <!-- Date picker + print -->
    <div class="no-print" style="display:flex;align-items:flex-end;gap:12px;margin-bottom:20px;flex-wrap:wrap">
      <div class="form-group" style="margin:0">
        <label class="form-label">Date</label>
        <input type="date" id="reportDate" class="form-control" onchange="loadAll()">
      </div>
      <button class="btn btn-outline btn-sm" onclick="window.print()">Print Report</button>
    </div>

    <!-- Print header -->
    <div class="print-header">
      <img src="/logo/eden 54 logo.jpeg" style="width:44px;height:44px;border-radius:50%;margin-bottom:8px">
      <h2 style="font-size:1.1rem;font-weight:500">Eden 54 Group — Daily Reports</h2>
      <p id="printDate" style="font-size:0.82rem;color:#555;margin-top:4px"></p>
    </div>

    <!-- Grand Total -->
    <div class="grand-bar no-print" id="grandBar" style="display:none">
      <div>
        <div class="grand-bar-label">Total Revenue — All Departments</div>
        <div class="grand-bar-val" id="grandTotal">₦0.00</div>
      </div>
      <div class="gt-chips" id="grandChips"></div>
    </div>

    <!-- Department cards (rendered dynamically) -->
    <div id="salesCard"></div>
    <div id="barbingCard"></div>
    <div id="barCard"></div>
    <div id="kitchenCard"></div>
    <div id="poolCard"></div>
    <div id="loungeCard"></div>
    <div id="apartmentCard"></div>
    <div id="otherCard"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/portal/firebase-init.js"></script>
<script>
const currentStaff = getStaff();
requireAccess(currentStaff, 'reports');
populateSidebar(currentStaff);
buildNav(currentStaff, 'reports');
document.getElementById('topDate').textContent =
  new Date().toLocaleDateString('en-NG',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
document.getElementById('reportDate').value = todayStr();

/* ── Helpers ── */
function N(n) { return fmtNaira(n||0); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function pill(ok, label) {
  return `<span class="pill-status ${ok?'pill-ok':'pill-none'}">${ok?'✓':'—'} ${label}</span>`;
}
function deptCard(id, icon, title, sub, body, badge='') {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = `<div class="dept-card">
    <div class="dept-header">
      <div class="dept-header-left"><span class="dept-icon">${icon}</span>
        <div><div class="dept-title">${title}</div><div class="dept-sub">${sub}</div></div>
      </div>${badge}
    </div>
    <div class="dept-body">${body}</div>
  </div>`;
}

/*
  Sales page stores department as its dropdown text, e.g. "Barbing Salon", "Bar", "Pool".
  Staff records store department as a key, e.g. "salon", "bar", "pool".
  This map routes sales records to the correct report section.
*/
function salesSection(dept) {
  const d = (dept||'').toLowerCase().trim();
  if (d === 'barbing salon' || d === 'salon' || d === 'barbing') return 'barbing';
  if (d === 'bar')                                                 return 'bar';
  if (d === 'pool')                                               return 'pool';
  if (d === 'restaurant & lounge' || d === 'lounge')              return 'lounge';
  if (d === 'apartment')                                          return 'apartment';
  return 'other'; // car rental, games, etc.
}

/* ── Load All ── */
async function loadAll() {
  const date = document.getElementById('reportDate').value;
  document.getElementById('printDate').textContent = 'Date: ' + date;
  document.getElementById('grandBar').style.display = 'none';
  ['salesCard','barbingCard','barCard','kitchenCard','poolCard','loungeCard','apartmentCard','otherCard']
    .forEach(id => { const el = document.getElementById(id); if(el) el.innerHTML=''; });

  const [allSales, barbReports, barStock, kitStock, poolComps] = await Promise.all([
    db.collection('sales').where('date','==',date).get().then(s=>s.docs.map(d=>d.data())),
    db.collection('barbing_reports').where('date','==',date).get().then(s=>s.docs.map(d=>d.data())),
    db.collection('bar_stock').where('date','==',date).get().then(s=>s.docs.map(d=>d.data())),
    db.collection('kitchen_inventory').where('date','==',date).get().then(s=>s.docs.map(d=>d.data())),
    db.collection('pool_competitions').where('date','==',date).get().then(s=>s.docs.map(d=>d.data())),
  ]);

  // Group sales by section
  const bySection = { barbing:[], bar:[], pool:[], lounge:[], apartment:[], other:[] };
  allSales.forEach(r => bySection[salesSection(r.department)].push(r));

  renderSales(date, allSales);
  renderBarbing(date, barbReports, bySection.barbing);
  renderBar(date, barStock, bySection.bar);
  renderKitchen(date, kitStock);
  renderPool(date, poolComps, bySection.pool);
  renderSalesOnly('loungeCard',    '🍽️', 'Restaurant & Lounge', date, bySection.lounge);
  renderSalesOnly('apartmentCard', '🏠', 'Apartment',           date, bySection.apartment);
  renderSalesOnly('otherCard',     '🎮', 'Other Revenue',       date, bySection.other);
  renderGrandTotal(allSales, poolComps, bySection);
}

/* ── Shared: sales revenue rows ── */
function salesRows(rows) {
  return rows.map(r=>`
    <div class="rev-row">
      <div><strong style="font-weight:400">${esc(r.staffName)}</strong></div>
      <div style="text-align:right">
        <div class="cash-breakdown">Cash ${N(r.cashSales)} · Trans ${N(r.transferSales)} · POS ${N(r.posSales)}</div>
        <div style="font-size:0.88rem;font-weight:400">${N(r.totalSales)}</div>
      </div>
    </div>`).join('');
}
function salesTotal(rows) {
  const tot = rows.reduce((s,r)=>s+(r.totalSales||0),0);
  return `<div class="rev-total"><span>Total</span><span class="text-gold">${N(tot)}</span></div>`;
}

/* ── DAILY SALES (overview of ALL departments) ── */
function renderSales(date, rows) {
  if (!rows.length) {
    deptCard('salesCard','💰','Daily Sales','Revenue across all departments',
      `<div class="no-sub">No sales submissions for ${date}</div>`);
    return;
  }
  // Group by department for clarity
  const byDept = {};
  rows.forEach(r => {
    const k = r.department||'Unknown';
    if (!byDept[k]) byDept[k] = [];
    byDept[k].push(r);
  });
  let html = '';
  Object.entries(byDept).forEach(([dept, dRows]) => {
    const dTot = dRows.reduce((s,r)=>s+(r.totalSales||0),0);
    html += `<div class="sub-label">${esc(dept)}</div>`;
    html += salesRows(dRows);
    html += `<div style="display:flex;justify-content:flex-end;font-size:0.8rem;color:var(--gold);padding:5px 0 10px;border-bottom:1px solid var(--border);margin-bottom:8px">${N(dTot)}</div>`;
  });
  const grandTot = rows.reduce((s,r)=>s+(r.totalSales||0),0);
  html += `<div class="rev-total" style="margin-top:0"><span>Grand Total — All Departments</span><span class="text-gold">${N(grandTot)}</span></div>`;
  deptCard('salesCard','💰','Daily Sales',`${rows.length} submission${rows.length!==1?'s':''}`,
    html, pill(true, rows.length+' filed'));
}

/* ── BARBING SALON ── */
function renderBarbing(date, reports, salonSales) {
  const hasRep = reports.length > 0, hasSales = salonSales.length > 0;
  if (!hasRep && !hasSales) {
    deptCard('barbingCard','💈','Barbing Salon','Services · Revenue',
      `<div class="no-sub">No salon submissions for ${date}</div>`);
    return;
  }
  let html = '';
  if (hasRep) {
    const grandRev = reports.reduce((s,r)=>s+(r.totalRevenue||0),0);
    const grandSvcs= reports.reduce((s,r)=>s+(r.clientsServed||0),0);
    html += `<div class="sub-label">Service Reports</div>`;
    html += reports.map(r=>{
      const svcs = (r.services||[]).map(s=>`${s.type} ${N(s.amount)}`).join(' · ');
      return `<div class="rev-row">
        <div>
          <strong style="font-weight:400">${esc(r.staffName)}</strong>
          <div class="cash-breakdown">${svcs||'No services listed'}</div>
          ${r.notes?`<div class="cash-breakdown">Note: ${esc(r.notes)}</div>`:''}
        </div>
        <div style="text-align:right">
          <div class="cash-breakdown">${r.clientsServed||0} clients</div>
          <div style="font-weight:400;color:var(--gold)">${N(r.totalRevenue)}</div>
        </div>
      </div>`;
    }).join('');
    html += `<div class="rev-total"><span>Services — ${grandSvcs} clients</span><span class="text-gold">${N(grandRev)}</span></div>`;
  }
  if (hasSales) {
    if (hasRep) html += '<div class="divider"></div>';
    html += `<div class="sub-label">Cash Sales</div>`;
    html += salesRows(salonSales);
    html += salesTotal(salonSales);
  }
  const count = reports.length + salonSales.length;
  deptCard('barbingCard','💈','Barbing Salon',`${count} submission${count!==1?'s':''}`,
    html, pill(true, count+' filed'));
}

/* ── BAR ── */
function renderBar(date, stockRows, barSales) {
  const hasStock = stockRows.length > 0, hasSales = barSales.length > 0;
  if (!hasStock && !hasSales) {
    deptCard('barCard','🍺','Bar','Stock · Revenue',
      `<div class="no-sub">No bar reports for ${date}</div>`);
    return;
  }
  let html = '';
  if (hasStock) {
    html += `<div class="sub-label">Stock Inventory</div>`;
    html += stockRows.map(r => {
      const low = (r.lowItems||[]);
      const chips = (r.items||[]).map(it=>
        `<span class="item-chip${it.lowAlert?' low':''}">${esc(it.name)}: ${it.closing}${it.unit||''}</span>`
      ).join('');
      return `<div style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-size:0.84rem;font-weight:400">${esc(r.staffName)}</span>
          ${low.length?`<span class="pill-status pill-warn">${low.length} low</span>`:`<span class="pill-status pill-ok">All OK</span>`}
        </div>
        <div class="bar-items">${chips}</div>
        ${r.notes?`<p style="font-size:0.75rem;color:var(--muted);margin-top:6px">Note: ${esc(r.notes)}</p>`:''}
      </div>`;
    }).join('<div class="divider"></div>');
  }
  if (hasSales) {
    if (hasStock) html += '<div class="divider"></div>';
    html += `<div class="sub-label">Revenue</div>`;
    html += salesRows(barSales);
    html += salesTotal(barSales);
  }
  const count = stockRows.length + barSales.length;
  deptCard('barCard','🍺','Bar',`${count} submission${count!==1?'s':''}`,
    html, pill(true, count+' filed'));
}

/* ── KITCHEN ── */
function renderKitchen(date, rows) {
  if (!rows.length) {
    deptCard('kitchenCard','🍽️','Kitchen','Inventory · Meals',
      `<div class="no-sub">No kitchen report for ${date}</div>`);
    return;
  }
  const body = rows.map(r => {
    const low = (r.lowItems||[]);
    const chips = (r.items||[]).map(it=>
      `<span class="item-chip${it.lowAlert?' low':''}">${esc(it.name)}: ${it.closing}${it.unit||''}</span>`
    ).join('');
    return `<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div>
          <span style="font-size:0.84rem;font-weight:400">${esc(r.staffName)}</span>
          <span style="font-size:0.75rem;color:var(--muted);margin-left:10px">${r.meals||0} meals prepared</span>
        </div>
        ${low.length?`<span class="pill-status pill-warn">${low.length} low</span>`:`<span class="pill-status pill-ok">All OK</span>`}
      </div>
      <div class="bar-items">${chips}</div>
      ${r.notes?`<p style="font-size:0.75rem;color:var(--muted);margin-top:6px">Note: ${esc(r.notes)}</p>`:''}
    </div>`;
  }).join('<div class="divider"></div>');
  deptCard('kitchenCard','🍳','Kitchen',`${rows.length} report${rows.length!==1?'s':''}`,
    body, pill(true, rows.length+' filed'));
}

/* ── POOL ── */
function renderPool(date, comps, poolSales) {
  const hasComps = comps.length > 0, hasSales = poolSales.length > 0;
  if (!hasComps && !hasSales) {
    deptCard('poolCard','🏊','Pool / Snooker','Competitions · Revenue',
      `<div class="no-sub">No pool report for ${date}</div>`);
    return;
  }
  let html = '';
  if (hasComps) {
    const grandNet = comps.reduce((s,r)=>s+(r.netRevenue||0),0);
    html += `<div class="sub-label">Competition Records</div>`;
    html += comps.map(r=>{
      const matchList = (r.matches||[]).map(m=>
        `<div class="match-row"><span style="color:var(--muted)">${esc(m.player1||'')} vs ${esc(m.player2||'')}</span>
         <span style="margin-left:auto">${N(m.stake||0)}</span></div>`
      ).join('');
      return `<div class="rev-row" style="flex-direction:column;align-items:flex-start;gap:6px">
        <div style="display:flex;width:100%;justify-content:space-between">
          <span><strong style="font-weight:400">${esc(r.type||'Competition')}</strong> · ${r.players||0} players</span>
          <span class="cash-breakdown">by ${esc(r.staffName)}</span>
        </div>
        ${matchList}
        <div style="display:flex;gap:18px;font-size:0.78rem">
          <span>Cash <strong class="text-ok">${N(r.cashCollected)}</strong></span>
          <span>Prize <strong style="color:var(--err)">${N(r.prizePaid)}</strong></span>
          <span>Net <strong class="text-gold">${N(r.netRevenue)}</strong></span>
        </div>
        ${r.notes?`<div class="cash-breakdown">Note: ${esc(r.notes)}</div>`:''}
      </div>`;
    }).join('');
    html += `<div class="rev-total"><span>Net Revenue</span><span class="text-gold">${N(grandNet)}</span></div>`;
  }
  if (hasSales) {
    if (hasComps) html += '<div class="divider"></div>';
    html += `<div class="sub-label">Cash Sales</div>`;
    html += salesRows(poolSales);
    html += salesTotal(poolSales);
  }
  const count = comps.length + poolSales.length;
  deptCard('poolCard','🏊','Pool / Snooker',`${count} submission${count!==1?'s':''}`,
    html, pill(true, count+' filed'));
}

/* ── SALES-ONLY SECTIONS (lounge, apartment, other) ── */
function renderSalesOnly(cardId, icon, title, date, rows) {
  if (!rows.length) return; // hide entirely if no submissions
  let html = salesRows(rows) + salesTotal(rows);
  deptCard(cardId, icon, title, `${rows.length} submission${rows.length!==1?'s':''}`,
    html, pill(true, rows.length+' filed'));
}

/* ── GRAND TOTAL ── */
function renderGrandTotal(allSales, poolComps, bySection) {
  // Revenue from sales collection covers everything except pool net (prize deduction)
  // Pool comps have their own net after prize payout — add net, not gross
  const salesTot = allSales.reduce((s,r)=>s+(r.totalSales||0),0);
  // Pool comps net replaces raw pool sales if both exist
  const poolCompNet = poolComps.reduce((s,r)=>s+(r.netRevenue||0),0);
  const poolSaleTot = bySection.pool.reduce((s,r)=>s+(r.totalSales||0),0);
  const poolNet  = poolCompNet || poolSaleTot; // prefer comp net if available

  const grand = salesTot - poolSaleTot + poolNet; // replace pool sales with net
  if (!grand) return;

  // Per-department chips
  const byDept = {};
  allSales.forEach(r => {
    const k = r.department||'Other';
    byDept[k] = (byDept[k]||0) + (r.totalSales||0);
  });
  const chips = Object.entries(byDept)
    .map(([d,t]) => `<div class="gt-chip">${esc(d)} <strong>${N(t)}</strong></div>`)
    .join('');

  document.getElementById('grandTotal').textContent = N(grand);
  document.getElementById('grandChips').innerHTML   = chips;
  document.getElementById('grandBar').style.display = 'flex';
}

loadAll();
</script>
</body>
</html>
