<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f2318">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Eden 54">
<title>Reports Overview · Eden 54 Portal</title>
<link rel="icon" type="image/jpeg" href="/logo/eden 54 logo.jpeg">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/portal/portal.css">
<style>
.dept-card { background:var(--card); border:1px solid var(--border); border-radius:8px; margin-bottom:20px; overflow:hidden; }
.dept-header { display:flex; align-items:center; justify-content:space-between; padding:16px 22px; border-bottom:1px solid var(--border); }
.dept-header-left { display:flex; align-items:center; gap:12px; }
.dept-icon { font-size:1.3rem; }
.dept-title { font-size:0.95rem; font-weight:400; }
.dept-sub { font-size:0.72rem; color:var(--muted); margin-top:2px; }
.dept-body { padding:18px 22px; }
.no-sub { display:flex; align-items:center; gap:8px; color:var(--muted); font-size:0.83rem; padding:6px 0; }
.no-sub::before { content:''; width:8px; height:8px; border-radius:50%; background:#fca5a5; flex-shrink:0; }

.rev-row { display:flex; align-items:flex-start; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:0.84rem; gap:12px; }
.rev-row:last-child { border-bottom:none; }
.rev-total { display:flex; justify-content:space-between; padding:10px 0 0; font-weight:400; font-size:0.9rem; border-top:2px solid var(--border); margin-top:4px; }
.cash-breakdown { font-size:0.72rem; color:var(--muted); margin-top:2px; }

.bar-items { display:flex; flex-wrap:wrap; gap:6px; }
.item-chip { font-size:0.72rem; padding:3px 10px; border-radius:12px; background:#f3f4f6; color:var(--text); }
.item-chip.low { background:#fef3c7; color:#92400e; }

.match-row { display:flex; gap:10px; font-size:0.82rem; padding:6px 0; border-bottom:1px solid var(--border); }
.match-row:last-child { border-bottom:none; }

.sub-label { font-size:0.65rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; margin-top:4px; }

.grand-bar { background:var(--deep); border-radius:8px; padding:20px 24px; display:flex; flex-direction:column; gap:16px; margin-bottom:24px; }
.grand-bar-top { display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:10px; }
.grand-bar-label { font-size:0.65rem; letter-spacing:0.18em; text-transform:uppercase; color:rgba(245,242,236,0.45); margin-bottom:4px; }
.grand-bar-val { font-size:1.6rem; font-weight:400; color:var(--gold); }
.gt-chips { display:flex; gap:10px; flex-wrap:wrap; }
.gt-dept-card { display:flex; flex-direction:column; gap:3px; padding:10px 16px; background:rgba(255,255,255,0.05); border-radius:6px; border:1px solid rgba(201,169,110,0.12); min-width:110px; }
.gt-dept-name { font-size:0.62rem; letter-spacing:0.12em; text-transform:uppercase; color:rgba(245,242,236,0.45); }
.gt-dept-amt { font-size:1rem; font-weight:400; color:var(--gold); }

.pill-status { display:inline-flex; align-items:center; gap:5px; font-size:0.68rem; padding:3px 10px; border-radius:12px; white-space:nowrap; }
.pill-ok   { background:#dcfce7; color:#166534; }
.pill-warn { background:#fef9c3; color:#854d0e; }
.pill-none { background:#f3f4f6; color:#6b7280; }

/* Sales Intelligence */
.si-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:24px; }
@media(max-width:900px){ .si-grid { grid-template-columns:1fr 1fr; } }
@media(max-width:640px){ .si-grid { grid-template-columns:1fr; } }
.si-card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:16px 18px; }
.si-card-title { font-size:0.68rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--muted); margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--border); }
.si-row { display:flex; flex-direction:column; gap:4px; padding:8px 0; border-bottom:1px solid rgba(0,0,0,0.05); }
.si-row:last-child { border-bottom:none; }
.si-row-top { display:flex; align-items:center; justify-content:space-between; gap:8px; font-size:0.83rem; }
.si-rank { font-size:0.68rem; color:var(--gold); font-weight:500; min-width:22px; flex-shrink:0; }
.si-bar-track { height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
.si-bar-fill { height:100%; background:linear-gradient(to right, var(--gold), rgba(201,169,110,0.35)); border-radius:2px; }
.si-none { color:var(--muted); font-size:0.8rem; padding:8px 0; }
.si-period-btn { font-size:0.7rem; padding:4px 10px; border:1px solid var(--border); background:transparent; color:var(--muted); border-radius:4px; cursor:pointer; transition:all 0.2s; }
.si-period-btn:hover { border-color:var(--gold); color:var(--gold); }
.si-period-btn.active { border-color:var(--gold); color:var(--gold); background:rgba(201,169,110,0.08); }
.si-dept-tab { font-size:0.65rem; padding:3px 8px; border:1px solid var(--border); background:transparent; color:var(--muted); border-radius:3px; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
.si-dept-tab:hover { border-color:var(--gold); color:var(--gold); }
.si-dept-tab.active { border-color:var(--gold); color:var(--gold); background:rgba(201,169,110,0.08); }
.si-top-prod { font-size:0.7rem; color:var(--muted); margin-top:2px; padding-left:30px; }

/* Monthly summary */
.ms-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
@media(max-width:640px){ .ms-grid { grid-template-columns:1fr; } }
.ms-card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:16px 18px; }
.ms-card.profit-pos { border-color:#86efac; }
.ms-card.profit-neg { border-color:#fca5a5; }
.ms-label { font-size:0.62rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
.ms-val   { font-size:1.25rem; font-weight:400; }
.ms-sub   { font-size:0.72rem; color:var(--muted); margin-top:3px; }
.ms-green { color:#16a34a; }
.ms-red   { color:#ef4444; }
.ms-gold  { color:var(--gold); }
.ms-cats  { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; }
/* Daily net strip inside grand bar */
.grand-net { display:flex; gap:20px; flex-wrap:wrap; padding-top:10px; margin-top:10px; border-top:1px solid rgba(245,242,236,0.15); }
.gn-item  { font-size:0.76rem; color:rgba(245,242,236,0.55); }
.gn-item strong { font-weight:400; }

@media print {
  body { background:#fff !important; }
  .sidebar,.topbar,.hamburger,.sb-overlay,.no-print { display:none !important; }
  .main { margin-left:0 !important; }
  .content { padding:0 !important; }
  .dept-card { box-shadow:none !important; page-break-inside:avoid; }
  .print-header { display:block !important; }
}
.print-header { display:none; text-align:center; margin-bottom:20px; }
/* Range report */
.mode-btn { font-size:0.72rem; padding:6px 14px; border:1px solid var(--border); background:transparent; color:var(--muted); border-radius:4px; cursor:pointer; transition:all .2s; font-family:'Jost',sans-serif; letter-spacing:0.05em; }
.mode-btn:hover { border-color:var(--gold); color:var(--gold); }
.mode-btn.active { border-color:var(--gold); color:var(--gold); background:rgba(201,169,110,0.08); font-weight:400; }
.rng-tbl th,.rng-tbl td { padding:9px 14px; text-align:right; white-space:nowrap; font-size:0.82rem; }
.rng-tbl tfoot td { border-top:2px solid var(--border); }
.rng-tbl tbody tr:hover { background:rgba(201,169,110,0.04); }
</style>
</head>
<body>
<div class="sb-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="sb-brand"><div class="sb-brand-name">Eden 54</div><div class="sb-brand-sub">Staff Portal</div></div>
  <nav class="sb-nav" id="sbNav"></nav>
  <div class="sb-foot">
    <div id="sidebarUser"></div>
    <a class="sb-item" onclick="switchProfile()" style="cursor:pointer"><i class="sb-icon">🔄</i> Switch Profile</a>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="hamburger" onclick="toggleSidebar()"><div></div><div></div><div></div></button>
      <h1>Reports Overview</h1>
    </div>
    <div class="topbar-date" id="topDate"></div>
  </div>
  <div class="content">
    <div id="alertBox" class="alert"></div>

    <!-- Mode toggle + department filter -->
    <div class="no-print" style="display:flex;gap:10px;margin-bottom:16px;align-items:flex-end;flex-wrap:wrap">
      <div>
        <div style="font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">View</div>
        <div style="display:flex;gap:6px">
          <button class="mode-btn active" id="modeSingle" onclick="setMode('single')">Single Day</button>
          <button class="mode-btn" id="modeRange" onclick="setMode('range')">Date Range</button>
        </div>
      </div>
      <div class="form-group" style="margin:0;min-width:200px">
        <label class="form-label">Department</label>
        <select id="filterDept" class="form-control" onchange="onDeptFilter()">
          <option value="all">All Departments</option>
          <option value="barbing">💈 Barbing Salon</option>
          <option value="games">🎮 Games &amp; Pool</option>
          <option value="drinks">🍺 Bar &amp; Drinks</option>
          <option value="food">🍽️ Food &amp; Restaurant</option>
          <option value="apt">🏠 Apartments</option>
          <option value="events">🎪 Events</option>
        </select>
      </div>
    </div>

    <!-- Single-day picker -->
    <div class="no-print" id="singleDateWrap" style="display:flex;align-items:flex-end;gap:12px;margin-bottom:20px;flex-wrap:wrap">
      <div class="form-group" style="margin:0">
        <label class="form-label">Date</label>
        <input type="date" id="reportDate" class="form-control" onchange="loadAll()">
      </div>
      <button class="btn btn-outline btn-sm" onclick="window.print()">Print Report</button>
    </div>

    <!-- Range picker -->
    <div class="no-print" id="rangeWrap" style="display:none;align-items:flex-end;gap:12px;margin-bottom:20px;flex-wrap:wrap">
      <div class="form-group" style="margin:0">
        <label class="form-label">From</label>
        <input type="date" id="rangeFrom" class="form-control">
      </div>
      <div class="form-group" style="margin:0">
        <label class="form-label">To</label>
        <input type="date" id="rangeTo" class="form-control">
      </div>
      <button class="btn btn-gold btn-sm" onclick="loadRange()">Load Report</button>
    </div>

    <!-- Range results -->
    <div id="rangeResult" style="display:none;margin-bottom:24px"></div>

    <!-- Daily revenue by department — shown first -->
    <div class="grand-bar no-print" id="grandBar" style="display:none">
      <div class="grand-bar-top">
        <div>
          <div class="grand-bar-label">Daily Revenue — All Departments</div>
          <div class="grand-bar-val" id="grandTotal">₦0.00</div>
        </div>
        <div id="grandNet" class="grand-net" style="padding:0;margin:0;border:none"></div>
      </div>
      <div class="gt-chips" id="grandChips"></div>
    </div>

    <!-- Monthly Financial Summary (HR only) -->
    <div class="ms-grid no-print" id="monthlySummary" style="display:none">
      <div class="ms-card">
        <div class="ms-label" id="msRevenueLabel">Month Revenue</div>
        <div class="ms-val ms-gold" id="msRevenue">—</div>
        <div class="ms-sub" id="msRevenueSub"></div>
      </div>
      <div class="ms-card">
        <div class="ms-label" id="msExpLabel">Month Expenses</div>
        <div class="ms-val ms-red" id="msExpenses">—</div>
        <div class="ms-sub" id="msExpSub"></div>
        <div class="ms-cats" id="msCatChips"></div>
      </div>
      <div class="ms-card" id="msNetCard">
        <div class="ms-label" id="msNetLabel">Net Profit</div>
        <div class="ms-val" id="msNet">—</div>
        <div class="ms-sub" id="msNetSub"></div>
      </div>
    </div>

    <!-- Sales Intelligence -->
    <div class="no-print" id="salesLeaders" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:10px">
        <div id="siLabel" style="font-size:0.68rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted)">Sales Intelligence</div>
        <div style="display:flex;gap:6px">
          <button class="si-period-btn" data-days="7" onclick="setSIPeriod(7)">7 Days</button>
          <button class="si-period-btn active" data-days="30" onclick="setSIPeriod(30)">30 Days</button>
          <button class="si-period-btn" data-days="90" onclick="setSIPeriod(90)">90 Days</button>
        </div>
      </div>
      <div class="si-grid">
        <div class="si-card">
          <div class="si-card-title">📅 Highest Sales Days</div>
          <div id="siTopDays"><div class="si-none">Loading…</div></div>
        </div>
        <div class="si-card">
          <div class="si-card-title">🏆 Department Rankings</div>
          <div id="siTopDepts"><div class="si-none">Loading…</div></div>
        </div>
        <div class="si-card">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px;flex-wrap:wrap">
            <div class="si-card-title" style="margin:0;padding:0;border:none">⭐ Best-Selling Products</div>
            <div id="siDeptTabs" style="display:flex;flex-wrap:wrap;gap:4px"></div>
          </div>
          <div style="height:1px;background:var(--border);margin-bottom:10px"></div>
          <div id="siTopProducts"><div class="si-none">Loading…</div></div>
        </div>
      </div>
    </div>

    <!-- Print header -->
    <div class="print-header">
      <img src="/logo/eden 54 logo.jpeg" style="width:44px;height:44px;border-radius:50%;margin-bottom:8px">
      <h2 style="font-size:1.1rem;font-weight:500">Eden 54 Group — Daily Reports</h2>
      <p id="printDate" style="font-size:0.82rem;color:#555;margin-top:4px"></p>
    </div>

    <!-- Department cards (rendered dynamically) -->
    <div id="gamesCard"></div>
    <div id="drinksCard"></div>
    <div id="foodCard"></div>
    <div id="apartmentCard"></div>
    <div id="eventsCard"></div>
    <div id="barbingCard"></div>
    <div id="expensesCard"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/portal/firebase-init.js"></script>
<script>
const currentStaff = getStaff();
requireAccess(currentStaff, 'reports');
populateSidebar(currentStaff);
buildNav(currentStaff, 'reports');
document.getElementById('topDate').textContent =
  new Date().toLocaleDateString('en-NG',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
document.getElementById('reportDate').value = todayStr();

/* ── Helpers ── */
function N(n) { return fmtNaira(n||0); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function pill(ok, label) {
  return `<span class="pill-status ${ok?'pill-ok':'pill-none'}">${ok?'✓':'—'} ${label}</span>`;
}
function deptCard(id, icon, title, sub, body, badge='') {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = `<div class="dept-card">
    <div class="dept-header">
      <div class="dept-header-left"><span class="dept-icon">${icon}</span>
        <div><div class="dept-title">${title}</div><div class="dept-sub">${sub}</div></div>
      </div>${badge}
    </div>
    <div class="dept-body">${body}</div>
  </div>`;
}

/* Map manual-report department labels → POS section key */
function deptToSection(dept) {
  const d = (dept||'').toLowerCase().trim();
  if (d === 'barbing salon' || d === 'salon' || d === 'barbing') return 'barbing';
  if (d === 'bar')                                                return 'drinks';
  if (d === 'pool' || d === 'games' || d === 'game')             return 'games';
  if (d === 'restaurant & lounge' || d === 'lounge')             return 'food';
  if (d === 'apartment')                                         return 'apt';
  if (d === 'car rental' || d === 'event' || d === 'events')     return 'events';
  return 'other';
}

/* Aggregate item sales across POS transactions → sorted by revenue */
function topItems(sales) {
  const map = {};
  sales.forEach(s => (s.items||[]).forEach(i => {
    const key = i.name || '—';
    if (!map[key]) map[key] = { qty:0, revenue:0, icon: i.icon||'' };
    map[key].qty     += (i.qty || 1);
    map[key].revenue += (i.total || (i.unitPrice||0) * (i.qty||1));
  }));
  return Object.entries(map).sort((a,b) => b[1].revenue - a[1].revenue);
}

function itemBreakdown(sales, unit) {
  const items = topItems(sales);
  if (!items.length) return '';
  const chips = items.map(([name, d], idx) =>
    `<span class="item-chip" style="${idx===0?'background:rgba(201,169,110,0.18);color:#92400e;font-weight:500':''}">
      ${esc(name)}: ${d.qty} ${unit||'sold'} · ${N(d.revenue)}
    </span>`
  ).join('');
  return `<div style="margin-top:10px"><div class="sub-label" style="margin-bottom:6px">Top Sellers</div><div class="bar-items">${chips}</div></div>`;
}

/* ── Load All ── */
async function loadAll() {
  const date = document.getElementById('reportDate').value;
  document.getElementById('printDate').textContent = 'Date: ' + date;
  document.getElementById('grandBar').style.display = 'none';
  ['gamesCard','drinksCard','foodCard','apartmentCard','eventsCard','barbingCard','expensesCard']
    .forEach(id => { const el = document.getElementById(id); if(el) el.innerHTML=''; });
  loadMonthlySummary();

  const [allSales, barbReports, barStock, kitStock, poolComps, allExpenses, aptRentals] = await Promise.all([
    db.collection('sales').where('date','==',date).get().then(s=>s.docs.map(d=>{
      const r = d.data();
      if (r.source === 'pos') {
        const amt = r.amount || 0;
        const pm  = (r.paymentMethod || '').toLowerCase();
        r.totalSales    = amt;
        r.cashSales     = pm === 'cash'     ? amt : 0;
        r.transferSales = pm === 'transfer' ? amt : 0;
        r.posSales      = pm === 'pos'      ? amt : 0;
      }
      return r;
    })),
    db.collection('barbing_reports').where('date','==',date).get().then(s=>s.docs.map(d=>d.data())),
    db.collection('bar_stock').where('date','==',date).get().then(s=>s.docs.map(d=>d.data())),
    db.collection('kitchen_inventory').where('date','==',date).get().then(s=>s.docs.map(d=>d.data())),
    db.collection('pool_competitions').where('date','==',date).get().then(s=>s.docs.map(d=>d.data())),
    db.collection('expenses').where('date','==',date).get().then(s=>s.docs.map(d=>d.data())),
    (()=>{
      const dayStart = new Date(date + 'T00:00:00');
      const dayEnd   = new Date(date + 'T23:59:59');
      return db.collection('apartmentRentals')
        .where('createdAt','>=',dayStart)
        .where('createdAt','<=',dayEnd)
        .get().then(s=>s.docs.map(d=>({id:d.id,...d.data()}))).catch(()=>[]);
    })(),
  ]);

  // Split POS sales by section field; manual sales by mapped department
  const pos = { games:[], drinks:[], food:[], apt:[], events:[], barbing:[] };
  const manual = { games:[], drinks:[], food:[], apt:[], barbing:[], other:[] };
  allSales.forEach(r => {
    if (r.source === 'pos') {
      const sec = (r.section||'events').toLowerCase();
      (pos[sec] || pos.events).push(r);
    } else {
      const sec = deptToSection(r.department);
      (manual[sec] || manual.other).push(r);
    }
  });

  renderGames(date, pos.games, poolComps, manual.games);
  renderDrinks(date, pos.drinks, barStock, manual.drinks);
  renderFood(date, pos.food, kitStock, manual.food);
  renderApartments(date, pos.apt, manual.apt, aptRentals);
  renderEvents(date, pos.events, manual.other);
  renderBarbing(date, barbReports, pos.barbing, manual.barbing);
  renderExpenses(date, allExpenses);
  renderGrandTotal(allSales, poolComps, allExpenses, aptRentals, barbReports);
  applyDeptFilterSingle(document.getElementById('filterDept').value);
}

/* ── Shared: sales revenue rows ── */
function salesRows(rows) {
  return rows.map(r => {
    const isPos = r.source === 'pos';
    const itemList = isPos && r.items && r.items.length
      ? r.items.map(i=>`${i.qty}× ${esc(i.name)}`).join(', ')
      : '';
    const custLine = isPos && (r.customerName || r.customerPhone)
      ? `<div class="cash-breakdown" style="color:var(--muted)">👤 ${esc(r.customerName||'Guest')}${r.customerPhone ? ' · '+esc(r.customerPhone) : ''}</div>`
      : '';
    const auditLine = isPos
      ? `<div class="cash-breakdown">${(r.paymentMethod||'').toUpperCase()}${r.receivedBy ? ' · Rcvd: '+esc(r.receivedBy) : ''}${itemList ? ' · '+itemList : ''}</div>`
      : `<div class="cash-breakdown">Cash ${N(r.cashSales)} · Trans ${N(r.transferSales)} · POS ${N(r.posSales)}</div>`;
    return `
    <div class="rev-row">
      <div>
        <strong style="font-weight:400">${esc(r.staffName)}</strong>
        ${isPos ? '<span style="font-size:0.68rem;background:rgba(201,169,110,0.15);color:#C9A96E;padding:1px 6px;border-radius:3px;margin-left:6px;letter-spacing:0.06em">POS</span>' : ''}
        ${custLine}
      </div>
      <div style="text-align:right">
        ${auditLine}
        <div style="font-size:0.88rem;font-weight:400">${N(r.totalSales)}</div>

/* ── BARBING SALON ── */
function renderBarbing(date, reports, posSales, salonSales) {
  const hasRep = reports.length > 0, hasPOS = posSales.length > 0, hasSales = salonSales.length > 0;
  if (!hasRep && !hasPOS && !hasSales) {
    deptCard('barbingCard','💈','Barbing Salon','Services · Revenue',
      `<div class="no-sub">No salon submissions for ${date}</div>`);
    return;
  }

  // Detect duplicate: staff who already have POS sales should not also count in service reports
  const posStaffIds = new Set(posSales.map(r => r.staffId).filter(Boolean));
  const posStaffNames = new Set(posSales.map(r => (r.staffName||'').toLowerCase()).filter(Boolean));
  const isDuplicate = r => posStaffIds.has(r.staffId) || posStaffNames.has((r.staffName||'').toLowerCase());
  const dupReports  = reports.filter(r => isDuplicate(r));
  const realReports = reports.filter(r => !isDuplicate(r));

  let html = '';

  // Duplicate warning banner
  if (dupReports.length > 0) {
    const names = [...new Set(dupReports.map(r=>r.staffName))].join(', ');
    html += `<div style="background:rgba(234,179,8,0.1);border:1px solid rgba(234,179,8,0.35);border-radius:6px;padding:10px 14px;margin-bottom:12px;font-size:0.78rem;color:#ca8a04">
      ⚠️ <strong>Duplicate detected</strong> — ${esc(names)} submitted a manual service report AND logged POS sales for this date.
      The service report has been excluded from totals. Staff should use POS only.
    </div>`;
  }

  if (hasPOS) {
    const tot = posSales.reduce((s,r)=>s+(r.totalSales||0),0);
    html += `<div class="sub-label">POS Transactions</div>`;
    html += salesRows(posSales);
    html += `<div class="rev-total"><span>POS Total</span><span class="text-gold">${N(tot)}</span></div>`;
    html += itemBreakdown(posSales, 'served');
  }

  // Only show non-duplicate service reports
  if (realReports.length > 0) {
    if (hasPOS) html += '<div class="divider"></div>';
    const grandRev  = realReports.reduce((s,r)=>s+(r.totalRevenue||0),0);
    const grandSvcs = realReports.reduce((s,r)=>s+(r.clientsServed||0),0);
    html += `<div class="sub-label">Service Reports</div>`;
    html += realReports.map(r=>{
      const svcs = (r.services||[]).map(s=>`${s.type} ${N(s.amount)}`).join(' · ');
      return `<div class="rev-row">
        <div>
          <strong style="font-weight:400">${esc(r.staffName)}</strong>
          <div class="cash-breakdown">${svcs||'No services listed'}</div>
          ${r.notes?`<div class="cash-breakdown">Note: ${esc(r.notes)}</div>`:''}
        </div>
        <div style="text-align:right">
          <div class="cash-breakdown">${r.clientsServed||0} clients</div>
          <div style="font-weight:400;color:var(--gold)">${N(r.totalRevenue)}</div>
        </div>
      </div>`;
    }).join('');
    html += `<div class="rev-total"><span>Services — ${grandSvcs} clients</span><span class="text-gold">${N(grandRev)}</span></div>`;
  }

  // Show duplicate reports collapsed with a strikethrough note
  if (dupReports.length > 0) {
    html += `<div class="divider"></div>`;
    html += `<div class="sub-label" style="color:#ca8a04">⚠️ Excluded (Duplicate Service Reports)</div>`;
    html += dupReports.map(r=>{
      const svcs = (r.services||[]).map(s=>`${s.type} ${N(s.amount)}`).join(' · ');
      return `<div class="rev-row" style="opacity:0.45">
        <div>
          <strong style="font-weight:400;text-decoration:line-through">${esc(r.staffName)}</strong>
          <div class="cash-breakdown">${svcs||'No services listed'}</div>
        </div>
        <div style="text-align:right;text-decoration:line-through;color:var(--gold)">${N(r.totalRevenue)}</div>
      </div>`;
    }).join('');
  }

  if (hasSales) {
    if (hasRep || hasPOS) html += '<div class="divider"></div>';
    html += `<div class="sub-label">Manual Reports</div>`;
    html += salesRows(salonSales);
    html += salesTotal(salonSales);
  }

  // Total excludes duplicate service reports
  const posTot = posSales.reduce((s,r)=>s+(r.totalSales||0),0);
  const repTot = realReports.reduce((s,r)=>s+(r.totalRevenue||0),0);
  const manTot = salonSales.reduce((s,r)=>s+(r.totalSales||0),0);
  const total  = posTot + repTot + manTot;
  const count  = reports.length + posSales.length + salonSales.length;
  deptCard('barbingCard','💈','Barbing Salon',`${count} submission${count!==1?'s':''}`,
    html, total > 0 ? `<span class="pill-status pill-ok">${N(total)}</span>` : pill(false, count+' filed'));
}

/* ── GRAND TOTAL ── */
function renderGrandTotal(allSales, poolComps, allExpenses, aptRentals, barbReports) {
  // Exclude barbing_reports for staff already represented in the sales collection (POS or manual).
  const barbSalesStaff = new Set();
  allSales.forEach(r => {
    const sec = r.source === 'pos' ? (r.section||'').toLowerCase() : deptToSection(r.department);
    if (sec === 'barbing') {
      if (r.staffId)   barbSalesStaff.add(r.staffId);
      if (r.staffName) barbSalesStaff.add((r.staffName||'').toLowerCase().trim());
    }
  });
  const dedupedBarb = (barbReports||[]).filter(r =>
    !barbSalesStaff.has(r.staffId) &&
    !barbSalesStaff.has((r.staffName||'').toLowerCase().trim())
  );
  const barbTot = dedupedBarb.reduce((s,r) => s + (r.totalRevenue||0), 0);

  const salesTot     = allSales.reduce((s,r)=>s+(r.totalSales||0),0);
  const compNet      = poolComps.reduce((s,r)=>s+(r.netRevenue||0),0);
  const aptRentalRev = (aptRentals||[]).reduce((s,r)=>s+(r.total||r.paid||0),0);
  const gross        = salesTot + compNet + aptRentalRev + barbTot;
  if (!gross) return;

  const totalExp = (allExpenses||[]).reduce((s,e)=>s+(e.amount||0),0);
  const netDay   = gross - totalExp;
  const isProfit = netDay >= 0;

  // Chips by POS section + manual category
  const secLabels = {
    games:'🎮 Games', drinks:'🍺 Bar & Drinks', food:'🍽️ Food & Restaurant',
    apt:'🏠 Apartments', events:'🎪 Events', barbing:'💈 Barbing Salon'
  };
  const bySec = {};
  allSales.forEach(r => {
    const key = r.source === 'pos'
      ? (secLabels[r.section] || '🎪 Events')
      : (secLabels[deptToSection(r.department)] || r.department || 'Other');
    bySec[key] = (bySec[key]||0) + (r.totalSales||0);
  });
  if (compNet > 0)      bySec['🏊 Competitions'] = compNet;
  if (aptRentalRev > 0) bySec['🏠 Apartments']  = (bySec['🏠 Apartments']||0) + aptRentalRev;
  if (barbTot > 0)      bySec['💈 Barbing Salon'] = (bySec['💈 Barbing Salon']||0) + barbTot;

  const chips = Object.entries(bySec)
    .filter(([,t]) => t > 0)
    .sort((a,b) => b[1]-a[1])
    .map(([k,t]) => `<div class="gt-dept-card">
      <div class="gt-dept-name">${esc(k)}</div>
      <div class="gt-dept-amt">${N(t)}</div>
    </div>`)
    .join('');

  document.getElementById('grandTotal').textContent = N(gross);
  document.getElementById('grandChips').innerHTML   = chips;
  document.getElementById('grandBar').style.display = 'flex';

  const netEl = document.getElementById('grandNet');
  if (netEl && totalExp > 0) {
    netEl.innerHTML = `
      <div class="gn-item">Expenses <strong style="color:#fca5a5">${N(totalExp)}</strong></div>
      <div class="gn-item">Daily Net <strong style="color:${isProfit?'#86efac':'#fca5a5'}">${isProfit?'+':''}${N(netDay)}</strong></div>`;
  } else if (netEl) { netEl.innerHTML = ''; }
}

/* ── MONTHLY FINANCIAL SUMMARY ── */
async function loadMonthlySummary() {
  const date = document.getElementById('reportDate').value;
  if (!date) return;
  const [yr, mo] = date.split('-');
  const monthStart = `${yr}-${mo}-01`;
  const lastDay    = new Date(+yr, +mo, 0).getDate();
  const monthEnd   = `${yr}-${mo}-${String(lastDay).padStart(2,'0')}`;
  const monthName  = new Date(+yr, +mo - 1, 1).toLocaleDateString('en-NG', {month:'long', year:'numeric'});

  try {
    const [salesSnap, expSnap, aptSnap] = await Promise.all([
      db.collection('sales').where('date','>=',monthStart).where('date','<=',monthEnd).get(),
      db.collection('expenses').where('date','>=',monthStart).where('date','<=',monthEnd).get(),
      db.collection('apartmentRentals').where('checkin','>=',monthStart).where('checkin','<=',monthEnd).get().catch(()=>({docs:[]})),
    ]);

    const mSales   = salesSnap.docs.map(d => {
      const r = d.data();
      if (r.source === 'pos') r.totalSales = r.amount || 0;
      return r;
    });
    const mExp     = expSnap.docs.map(d => d.data());
    const mAptRent = aptSnap.docs.map(d => d.data());

    const totalSales  = mSales.reduce((s,r)   => s + (r.totalSales||0), 0);
    const aptRentRev  = mAptRent.reduce((s,r) => s + (r.paid||0),       0);
    const totalRev    = totalSales + aptRentRev;
    const totalExp    = mExp.reduce((s,r)     => s + (r.amount||0),     0);
    const net         = totalRev - totalExp;

    // Top expense categories
    const byCat = {};
    mExp.forEach(e => { const k = e.category||'Other'; byCat[k] = (byCat[k]||0) + (e.amount||0); });
    const catChips = Object.entries(byCat).sort((a,b)=>b[1]-a[1])
      .map(([cat,amt]) => `<span class="item-chip">${esc(cat)} <strong>${N(amt)}</strong></span>`)
      .join('');

    // Expense by department (for sub-text)
    const byDeptExp = {};
    mExp.forEach(e => { const k = e.department||'other'; byDeptExp[k] = (byDeptExp[k]||0) + (e.amount||0); });
    const deptLabels = { salon:'Salon', lounge:'Lounge', bar:'Bar', kitchen:'Kitchen', apartment:'Apt', pool:'Pool', management:'Mgmt' };
    const deptExpSub = Object.entries(byDeptExp).sort((a,b)=>b[1]-a[1])
      .slice(0,3).map(([k,v]) => `${deptLabels[k]||k} ${N(v)}`).join(' · ');

    const isProfit = net >= 0;

    document.getElementById('msRevenueLabel').textContent = monthName + ' — Revenue';
    document.getElementById('msRevenue').textContent      = N(totalRev);
    document.getElementById('msRevenueSub').textContent   = mSales.length + ' submission' + (mSales.length!==1?'s':'')
      + (aptRentRev > 0 ? ' · Apt Rentals ' + N(aptRentRev) : '');

    document.getElementById('msExpLabel').textContent     = monthName + ' — Expenses';
    document.getElementById('msExpenses').textContent     = N(totalExp);
    document.getElementById('msExpSub').textContent       = mExp.length + ' expense' + (mExp.length!==1?'s':'') + (deptExpSub ? ' · ' + deptExpSub : '');
    document.getElementById('msCatChips').innerHTML       = catChips;

    document.getElementById('msNetLabel').textContent     = monthName + ' — Net Profit';
    const netEl = document.getElementById('msNet');
    netEl.textContent   = (isProfit ? '+' : '') + N(net);
    netEl.className     = 'ms-val ' + (isProfit ? 'ms-green' : 'ms-red');
    document.getElementById('msNetSub').textContent       = isProfit ? 'Operating surplus' : 'Operating deficit';
    const netCard = document.getElementById('msNetCard');
    netCard.className   = 'ms-card ' + (isProfit ? 'profit-pos' : 'profit-neg');

    document.getElementById('monthlySummary').style.display = 'grid';
  } catch(e) {
    console.error('Monthly summary:', e);
  }
}

/* ── SALES INTELLIGENCE ── */
let siPeriod = 30;
let siDeptFilter = 'all';
let siCache = null;

const SI_DEPT_LABELS = {
  games:'🎮 Games', drinks:'🍺 Bar & Drinks', food:'🍽️ Food & Restaurant',
  apt:'🏠 Apartments', barbing:'💈 Barbing Salon', events:'🎪 Events'
};

function setSIPeriod(days) {
  siPeriod = days;
  document.querySelectorAll('.si-period-btn').forEach(b =>
    b.classList.toggle('active', Number(b.dataset.days) === days)
  );
  loadSalesLeaders();
}

function setSIDept(sec) {
  siDeptFilter = sec;
  document.querySelectorAll('.si-dept-tab').forEach(b =>
    b.classList.toggle('active', b.dataset.sec === sec)
  );
  renderSIProducts();
}

function renderSIProducts() {
  const el = document.getElementById('siTopProducts');
  if (!el || !siCache) return;
  const items = siDeptFilter === 'all'
    ? siCache.allProducts
    : Object.entries(siCache.byDeptProducts[siDeptFilter] || {})
        .filter(([, d]) => d.revenue > 0)
        .sort((a, b) => b[1].revenue - a[1].revenue)
        .slice(0, 8);
  const maxProd = items[0]?.[1].revenue || 1;
  el.innerHTML = items.length
    ? items.map(([name, d], i) => `<div class="si-row">
        <div class="si-row-top">
          <span style="display:flex;align-items:center;gap:8px">
            <span class="si-rank">#${i + 1}</span><span>${esc(name)}</span>
          </span>
          <div style="text-align:right">
            <div style="color:var(--gold);font-weight:400">${N(d.revenue)}</div>
            <div style="font-size:0.68rem;color:var(--muted)">${d.qty} sold</div>
          </div>
        </div>
        <div class="si-bar-track"><div class="si-bar-fill" style="width:${Math.round((d.revenue/maxProd)*100)}%"></div></div>
      </div>`).join('')
    : '<div class="si-none">No product data for this department</div>';
}

async function loadSalesLeaders() {
  const el = document.getElementById('salesLeaders');
  if (!el) return;

  const today = new Date();
  const start = new Date(today);
  start.setDate(start.getDate() - siPeriod + 1);
  const startStr = start.toISOString().split('T')[0];
  const endStr   = today.toISOString().split('T')[0];

  document.getElementById('siLabel').textContent =
    `Sales Intelligence — Last ${siPeriod} Day${siPeriod === 1 ? '' : 's'}`;
  ['siTopDays','siTopDepts','siTopProducts'].forEach(id => {
    document.getElementById(id).innerHTML = '<div class="si-none">Loading…</div>';
  });
  el.style.display = 'block';
  siCache = null;

  try {
    const snap = await db.collection('sales')
      .where('date', '>=', startStr)
      .where('date', '<=', endStr)
      .get();

    const sales = snap.docs.map(d => d.data());

    /* ── Highest Sales Days ── */
    const byDate = {};
    sales.forEach(s => {
      const d   = s.date || '';
      const amt = s.source === 'pos' ? (s.amount || 0) : (s.totalSales || 0);
      if (d) byDate[d] = (byDate[d] || 0) + amt;
    });
    const topDays = Object.entries(byDate)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 5);
    const maxDay = topDays[0]?.[1] || 1;

    document.getElementById('siTopDays').innerHTML = topDays.length
      ? topDays.map(([date, amt], i) => {
          const label = new Date(date + 'T12:00:00')
            .toLocaleDateString('en-NG', { weekday:'short', day:'numeric', month:'short' });
          return `<div class="si-row">
            <div class="si-row-top">
              <span style="display:flex;align-items:center;gap:8px">
                <span class="si-rank">#${i + 1}</span><span>${label}</span>
              </span>
              <span style="color:var(--gold);font-weight:400">${N(amt)}</span>
            </div>
            <div class="si-bar-track"><div class="si-bar-fill" style="width:${Math.round((amt/maxDay)*100)}%"></div></div>
          </div>`;
        }).join('')
      : '<div class="si-none">No sales data in this period</div>';

    /* ── Department Rankings + per-dept products ── */
    const byDept    = {};   // label → total revenue
    const byDeptSec = {};   // label → section key
    const byDeptProducts = {}; // section key → { productName: { qty, revenue } }

    sales.forEach(s => {
      const amt   = s.source === 'pos' ? (s.amount || 0) : (s.totalSales || 0);
      const sec   = s.source === 'pos'
        ? (s.section || 'events').toLowerCase()
        : deptToSection(s.department);
      const label = SI_DEPT_LABELS[sec] || (s.department || '📦 Other');
      byDept[label]    = (byDept[label] || 0) + amt;
      byDeptSec[label] = sec;

      if (!byDeptProducts[sec]) byDeptProducts[sec] = {};
      (s.items || []).forEach(item => {
        const name = (item.name || '').trim() || '—';
        if (!byDeptProducts[sec][name]) byDeptProducts[sec][name] = { qty:0, revenue:0 };
        byDeptProducts[sec][name].qty     += (item.qty || 1);
        byDeptProducts[sec][name].revenue += (item.total || (item.unitPrice||0)*(item.qty||1));
      });
    });

    const topDepts = Object.entries(byDept)
      .filter(([, v]) => v > 0)
      .sort((a, b) => b[1] - a[1]);
    const maxDept = topDepts[0]?.[1] || 1;

    document.getElementById('siTopDepts').innerHTML = topDepts.length
      ? topDepts.map(([name, amt], i) => {
          const sec      = byDeptSec[name] || '';
          const topProd  = Object.entries(byDeptProducts[sec] || {})
            .sort((a, b) => b[1].revenue - a[1].revenue)[0];
          const prodLine = topProd
            ? `<div class="si-top-prod">⭐ ${esc(topProd[0])} · ${N(topProd[1].revenue)} · ${topProd[1].qty} sold</div>`
            : '';
          return `<div class="si-row">
            <div class="si-row-top">
              <span style="display:flex;align-items:center;gap:8px">
                <span class="si-rank">#${i + 1}</span><span>${esc(name)}</span>
              </span>
              <span style="color:var(--gold);font-weight:400">${N(amt)}</span>
            </div>
            ${prodLine}
            <div class="si-bar-track"><div class="si-bar-fill" style="width:${Math.round((amt/maxDept)*100)}%"></div></div>
          </div>`;
        }).join('')
      : '<div class="si-none">No department data</div>';

    /* ── Build all-products list & dept tabs ── */
    const allProductsMap = {};
    Object.values(byDeptProducts).forEach(deptMap => {
      Object.entries(deptMap).forEach(([name, d]) => {
        if (!allProductsMap[name]) allProductsMap[name] = { qty:0, revenue:0 };
        allProductsMap[name].qty     += d.qty;
        allProductsMap[name].revenue += d.revenue;
      });
    });
    const allProducts = Object.entries(allProductsMap)
      .filter(([, d]) => d.revenue > 0)
      .sort((a, b) => b[1].revenue - a[1].revenue)
      .slice(0, 8);

    siCache = { byDeptProducts, allProducts };

    // Dept filter tabs — only show depts that have product items
    const tabsEl = document.getElementById('siDeptTabs');
    if (tabsEl) {
      const deptsWithItems = Object.entries(byDeptProducts)
        .filter(([, map]) => Object.values(map).some(d => d.revenue > 0))
        .map(([sec]) => sec);
      tabsEl.innerHTML = [
        `<button class="si-dept-tab${siDeptFilter==='all'?' active':''}" data-sec="all" onclick="setSIDept('all')">All</button>`,
        ...deptsWithItems.map(sec =>
          `<button class="si-dept-tab${siDeptFilter===sec?' active':''}" data-sec="${sec}" onclick="setSIDept('${sec}')">
            ${(SI_DEPT_LABELS[sec]||sec).replace(/^\S+\s/, '')}
          </button>`
        )
      ].join('');
    }

    renderSIProducts();

  } catch (err) {
    console.error('Sales leaders:', err);
    ['siTopDays','siTopDepts','siTopProducts'].forEach(id => {
      document.getElementById(id).innerHTML =
        '<div class="si-none" style="color:#ef4444">Failed to load</div>';
    });
  }
}

loadAll();
loadMonthlySummary();
loadSalesLeaders();

/* ── Mode toggle ── */
const DAILY_ELS = ['grandBar','monthlySummary','salesLeaders','gamesCard','drinksCard','foodCard','apartmentCard','eventsCard','barbingCard','expensesCard'];

function setMode(mode) {
  const isRange = mode === 'range';
  document.getElementById('singleDateWrap').style.display = isRange ? 'none' : 'flex';
  document.getElementById('rangeWrap').style.display      = isRange ? 'flex' : 'none';
  document.getElementById('rangeResult').style.display    = isRange ? 'block' : 'none';
  DAILY_ELS.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = isRange ? 'none' : '';
  });
  document.getElementById('modeSingle').classList.toggle('active', !isRange);
  document.getElementById('modeRange').classList.toggle('active',  isRange);
  if (!isRange) { loadAll(); loadMonthlySummary(); }
}

/* ── Department filter ── */
const DEPT_CARD_MAP = {
  barbing: 'barbingCard', games: 'gamesCard', drinks: 'drinksCard',
  food: 'foodCard', apt: 'apartmentCard', events: 'eventsCard',
};

function applyDeptFilterSingle(dept) {
  const all = Object.values(DEPT_CARD_MAP);
  if (dept === 'all') {
    all.forEach(id => { const el = document.getElementById(id); if (el) el.style.display = ''; });
    // grandBar was already set by renderGrandTotal — don't override
  } else {
    all.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.style.display = (DEPT_CARD_MAP[dept] === id) ? '' : 'none';
    });
    // Hide the all-dept grand bar when a single dept is selected
    const gb = document.getElementById('grandBar');
    if (gb) gb.style.display = 'none';
  }
}

function onDeptFilter() {
  const dept    = document.getElementById('filterDept').value;
  const isRange = document.getElementById('rangeWrap').style.display !== 'none';
  if (isRange) {
    if (_rangeCache) renderRangeTable(_rangeCache, dept);
  } else {
    applyDeptFilterSingle(dept);
  }
}

/* ── Range Report ── */
(function initRange() {
  const today = new Date();
  const yyyy  = today.getFullYear();
  const mm    = String(today.getMonth()+1).padStart(2,'0');
  document.getElementById('rangeFrom').value = `${yyyy}-${mm}-01`;
  document.getElementById('rangeTo').value   = todayStr();
})();

let _rangeCache = null;

async function loadRange() {
  const fromDate = document.getElementById('rangeFrom').value;
  const toDate   = document.getElementById('rangeTo').value;
  if (!fromDate || !toDate) { alert('Please select both a From and To date.'); return; }
  if (fromDate > toDate)    { alert('From date must be before the To date.'); return; }

  const el = document.getElementById('rangeResult');
  el.style.display = 'block';
  el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted);font-size:0.85rem">Loading…</div>';

  try {
    const [salesSnap, barbSnap, compSnap] = await Promise.all([
      db.collection('sales').where('date','>=',fromDate).where('date','<=',toDate).get(),
      db.collection('barbing_reports').where('date','>=',fromDate).where('date','<=',toDate).get(),
      db.collection('pool_competitions').where('date','>=',fromDate).where('date','<=',toDate).get(),
    ]);
    let aptDocs = [];
    try {
      const aptSnap = await db.collection('apartmentRentals').where('checkin','>=',fromDate).where('checkin','<=',toDate).get();
      aptDocs = aptSnap.docs;
    } catch(e) {}

    const DEPTS = ['barbing','games','drinks','food','apt','events'];
    const days  = {};
    const getDay = d => {
      if (!days[d]) days[d] = { barbing:0, games:0, drinks:0, food:0, apt:0, events:0 };
      return days[d];
    };

    const posBarbByDay = {};
    salesSnap.forEach(doc => {
      const r = doc.data();
      if (!r.date) return;
      const amt = r.source === 'pos' ? (r.amount||0) : (r.totalSales||0);
      const sec = r.source === 'pos'
        ? (r.section||'events').toLowerCase()
        : deptToSection(r.department);
      const d = getDay(r.date);
      if (DEPTS.includes(sec)) d[sec] += amt; else d.events += amt;
      const isBarbingSale = r.source === 'pos'
        ? (r.section||'').toLowerCase() === 'barbing'
        : deptToSection(r.department) === 'barbing';
      if (isBarbingSale) {
        if (!posBarbByDay[r.date]) posBarbByDay[r.date] = new Set();
        if (r.staffName) posBarbByDay[r.date].add((r.staffName||'').toLowerCase().trim());
        if (r.staffId)   posBarbByDay[r.date].add('id:'+r.staffId);
      }
    });

    compSnap.forEach(doc => {
      const r = doc.data();
      if (r.date) getDay(r.date).games += (r.netRevenue||0);
    });

    barbSnap.forEach(doc => {
      const r = doc.data();
      if (!r.date) return;
      const ps  = posBarbByDay[r.date] || new Set();
      const dup = ps.has((r.staffName||'').toLowerCase()) || ps.has('id:'+(r.staffId||''));
      if (!dup) getDay(r.date).barbing += (r.totalRevenue||0);
    });

    aptDocs.forEach(doc => {
      const r = doc.data();
      const d = r.checkin;
      if (d && d >= fromDate && d <= toDate) getDay(d).apt += (r.paid||0);
    });

    const sortedDates = Object.keys(days).sort();
    if (!sortedDates.length) {
      el.innerHTML = `<div class="dept-card"><div class="dept-body" style="text-align:center;color:var(--muted);padding:32px">No activity found for this date range.</div></div>`;
      _rangeCache = null;
      return;
    }

    _rangeCache = { days, sortedDates, fromDate, toDate };
    renderRangeTable(_rangeCache, document.getElementById('filterDept').value);

  } catch(err) {
    document.getElementById('rangeResult').innerHTML = `<div class="dept-card"><div class="dept-body" style="color:#ef4444;padding:24px">Error loading range report: ${esc(err.message)}</div></div>`;
    console.error('loadRange:', err);
  }
}

function renderRangeTable(cache, dept) {
  const { days, sortedDates, fromDate, toDate } = cache;
  const ALL_COLS = [
    { key:'barbing', label:'💈 Barbing' },
    { key:'games',   label:'🎮 Games' },
    { key:'drinks',  label:'🍺 Bar' },
    { key:'food',    label:'🍽️ Food' },
    { key:'apt',     label:'🏠 Apt' },
    { key:'events',  label:'🎪 Events' },
  ];
  const DEPTS = ALL_COLS.map(c => c.key);
  const cols  = (dept === 'all') ? ALL_COLS : ALL_COLS.filter(c => c.key === dept);
  const keys  = cols.map(c => c.key);
  const showTotal = cols.length > 1;

  // Compute totals for visible columns
  const totals = {};
  DEPTS.forEach(k => { totals[k] = 0; });
  sortedDates.forEach(d => keys.forEach(k => totals[k] += days[d][k]));
  const grandTot = keys.reduce((s,k) => s + totals[k], 0);

  const deptLabel = dept === 'all' ? 'All Departments' : (cols[0]?.label || dept);

  const thead = `<tr>
    <th style="text-align:left">Date</th>
    ${cols.map(c=>`<th>${c.label}</th>`).join('')}
    ${showTotal ? '<th>Total</th>' : ''}
  </tr>`;

  const rows = sortedDates.map(date => {
    const d      = days[date];
    const dayTot = keys.reduce((s,k) => s + d[k], 0);
    if (!dayTot) return '';
    const label = new Date(date+'T12:00:00').toLocaleDateString('en-NG',{weekday:'short',day:'numeric',month:'short'});
    return `<tr>
      <td style="text-align:left">
        <a href="#" onclick="setMode('single');document.getElementById('reportDate').value='${date}';loadAll();return false"
           style="color:var(--gold);text-decoration:none;font-size:0.82rem">${label}</a>
      </td>
      ${cols.map(c=>`<td style="color:${d[c.key]>0?'var(--text)':'var(--muted)'}">${d[c.key]>0?N(d[c.key]):'—'}</td>`).join('')}
      ${showTotal ? `<td style="font-weight:400;color:var(--gold)">${N(dayTot)}</td>` : ''}
    </tr>`;
  }).filter(Boolean).join('');

  const activeDays = sortedDates.filter(d => keys.some(k => days[d][k] > 0)).length;

  const tfoot = `<tr style="background:rgba(201,169,110,0.06)">
    <td style="text-align:left;font-weight:400">Total · ${activeDays} day${activeDays!==1?'s':''}</td>
    ${cols.map(c=>`<td style="font-weight:400;color:${totals[c.key]>0?'var(--gold)':'var(--muted)'}">${totals[c.key]>0?N(totals[c.key]):'—'}</td>`).join('')}
    ${showTotal ? `<td style="font-weight:400;color:var(--gold)">${N(grandTot)}</td>` : ''}
  </tr>`;

  const colSpan = cols.length + (showTotal ? 2 : 1);
  document.getElementById('rangeResult').innerHTML = `<div class="dept-card">
    <div class="dept-header">
      <div class="dept-header-left">
        <span class="dept-icon">📅</span>
        <div>
          <div class="dept-title">Range Report — ${deptLabel}</div>
          <div class="dept-sub">${fromDate} → ${toDate} · ${activeDays} day${activeDays!==1?'s':''} with activity</div>
        </div>
      </div>
      <span class="pill-status pill-ok">${N(grandTot)}</span>
    </div>
    <div class="dept-body">
      <div class="tbl-wrap">
        <table class="rng-tbl" style="min-width:${cols.length>1?'560':'260'}px;width:100%">
          <thead>${thead}</thead>
          <tbody>${rows || `<tr><td colspan="${colSpan}" style="text-align:center;color:var(--muted);padding:24px">No activity for this department in the selected range.</td></tr>`}</tbody>
          <tfoot>${tfoot}</tfoot>
        </table>
      </div>
    </div>
  </div>`;
}
</script>
