<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports Overview · Eden 54 Portal</title>
<link rel="icon" type="image/jpeg" href="/logo/eden 54 logo.jpeg">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/portal/portal.css">
<style>
.dept-card { background:var(--card); border:1px solid var(--border); border-radius:8px; margin-bottom:20px; overflow:hidden; }
.dept-header { display:flex; align-items:center; justify-content:space-between; padding:16px 22px; border-bottom:1px solid var(--border); }
.dept-header-left { display:flex; align-items:center; gap:12px; }
.dept-icon { font-size:1.3rem; }
.dept-title { font-size:0.95rem; font-weight:400; }
.dept-sub { font-size:0.72rem; color:var(--muted); margin-top:2px; }
.dept-body { padding:18px 22px; }
.no-sub { display:flex; align-items:center; gap:8px; color:var(--muted); font-size:0.83rem; padding:6px 0; }
.no-sub::before { content:''; width:8px; height:8px; border-radius:50%; background:#fca5a5; flex-shrink:0; }

.rev-row { display:flex; align-items:flex-start; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:0.84rem; gap:12px; }
.rev-row:last-child { border-bottom:none; }
.rev-total { display:flex; justify-content:space-between; padding:10px 0 0; font-weight:400; font-size:0.9rem; border-top:2px solid var(--border); margin-top:4px; }
.cash-breakdown { font-size:0.72rem; color:var(--muted); margin-top:2px; }

.bar-items { display:flex; flex-wrap:wrap; gap:6px; }
.item-chip { font-size:0.72rem; padding:3px 10px; border-radius:12px; background:#f3f4f6; color:var(--text); }
.item-chip.low { background:#fef3c7; color:#92400e; }

.match-row { display:flex; gap:10px; font-size:0.82rem; padding:6px 0; border-bottom:1px solid var(--border); }
.match-row:last-child { border-bottom:none; }

.sub-label { font-size:0.65rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; margin-top:4px; }

.grand-bar { background:var(--deep); border-radius:8px; padding:18px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:14px; margin-bottom:24px; }
.grand-bar-label { font-size:0.65rem; letter-spacing:0.18em; text-transform:uppercase; color:rgba(245,242,236,0.45); margin-bottom:4px; }
.grand-bar-val { font-size:1.5rem; font-weight:400; color:var(--gold); }
.gt-chips { display:flex; gap:12px; flex-wrap:wrap; }
.gt-chip { font-size:0.75rem; color:rgba(245,242,236,0.55); white-space:nowrap; }
.gt-chip strong { color:rgba(245,242,236,0.9); font-weight:400; }

.pill-status { display:inline-flex; align-items:center; gap:5px; font-size:0.68rem; padding:3px 10px; border-radius:12px; white-space:nowrap; }
.pill-ok   { background:#dcfce7; color:#166534; }
.pill-warn { background:#fef9c3; color:#854d0e; }
.pill-none { background:#f3f4f6; color:#6b7280; }

/* Monthly summary */
.ms-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
@media(max-width:640px){ .ms-grid { grid-template-columns:1fr; } }
.ms-card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:16px 18px; }
.ms-card.profit-pos { border-color:#86efac; }
.ms-card.profit-neg { border-color:#fca5a5; }
.ms-label { font-size:0.62rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
.ms-val   { font-size:1.25rem; font-weight:400; }
.ms-sub   { font-size:0.72rem; color:var(--muted); margin-top:3px; }
.ms-green { color:#16a34a; }
.ms-red   { color:#ef4444; }
.ms-gold  { color:var(--gold); }
.ms-cats  { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; }
/* Daily net strip inside grand bar */
.grand-net { display:flex; gap:20px; flex-wrap:wrap; padding-top:10px; margin-top:10px; border-top:1px solid rgba(245,242,236,0.15); }
.gn-item  { font-size:0.76rem; color:rgba(245,242,236,0.55); }
.gn-item strong { font-weight:400; }

@media print {
  body { background:#fff !important; }
  .sidebar,.topbar,.hamburger,.sb-overlay,.no-print { display:none !important; }
  .main { margin-left:0 !important; }
  .content { padding:0 !important; }
  .dept-card { box-shadow:none !important; page-break-inside:avoid; }
  .print-header { display:block !important; }
}
.print-header { display:none; text-align:center; margin-bottom:20px; }
</style>
</head>
<body>
<div class="sb-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="sb-brand"><div class="sb-brand-name">Eden 54</div><div class="sb-brand-sub">Staff Portal</div></div>
  <nav class="sb-nav" id="sbNav"></nav>
  <div class="sb-foot">
    <div id="sidebarUser"></div>
    <a class="sb-item" onclick="switchProfile()" style="cursor:pointer"><i class="sb-icon">🔄</i> Switch Profile</a>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="hamburger" onclick="toggleSidebar()"><div></div><div></div><div></div></button>
      <h1>Reports Overview</h1>
    </div>
    <div class="topbar-date" id="topDate"></div>
  </div>
  <div class="content">
    <div id="alertBox" class="alert"></div>

    <!-- Date picker + print -->
    <div class="no-print" style="display:flex;align-items:flex-end;gap:12px;margin-bottom:20px;flex-wrap:wrap">
      <div class="form-group" style="margin:0">
        <label class="form-label">Date</label>
        <input type="date" id="reportDate" class="form-control" onchange="loadAll()">
      </div>
      <button class="btn btn-outline btn-sm" onclick="window.print()">Print Report</button>
    </div>

    <!-- Monthly Financial Summary (HR only) -->
    <div class="ms-grid no-print" id="monthlySummary" style="display:none">
      <div class="ms-card">
        <div class="ms-label" id="msRevenueLabel">Month Revenue</div>
        <div class="ms-val ms-gold" id="msRevenue">—</div>
        <div class="ms-sub" id="msRevenueSub"></div>
      </div>
      <div class="ms-card">
        <div class="ms-label" id="msExpLabel">Month Expenses</div>
        <div class="ms-val ms-red" id="msExpenses">—</div>
        <div class="ms-sub" id="msExpSub"></div>
        <div class="ms-cats" id="msCatChips"></div>
      </div>
      <div class="ms-card" id="msNetCard">
        <div class="ms-label" id="msNetLabel">Net Profit</div>
        <div class="ms-val" id="msNet">—</div>
        <div class="ms-sub" id="msNetSub"></div>
      </div>
    </div>

    <!-- Print header -->
    <div class="print-header">
      <img src="/logo/eden 54 logo.jpeg" style="width:44px;height:44px;border-radius:50%;margin-bottom:8px">
      <h2 style="font-size:1.1rem;font-weight:500">Eden 54 Group — Daily Reports</h2>
      <p id="printDate" style="font-size:0.82rem;color:#555;margin-top:4px"></p>
    </div>

    <!-- Grand Total (daily) -->
    <div class="grand-bar no-print" id="grandBar" style="display:none">
      <div style="flex:1">
        <div class="grand-bar-label">Daily Revenue — All Departments</div>
        <div class="grand-bar-val" id="grandTotal">₦0.00</div>
        <div class="grand-net" id="grandNet"></div>
      </div>
      <div class="gt-chips" id="grandChips"></div>
    </div>

    <!-- Department cards (rendered dynamically) -->
    <div id="gamesCard"></div>
    <div id="drinksCard"></div>
    <div id="foodCard"></div>
    <div id="apartmentCard"></div>
    <div id="eventsCard"></div>
    <div id="barbingCard"></div>
    <div id="expensesCard"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/portal/firebase-init.js"></script>
<script>
const currentStaff = getStaff();
requireAccess(currentStaff, 'reports');
populateSidebar(currentStaff);
buildNav(currentStaff, 'reports');
document.getElementById('topDate').textContent =
  new Date().toLocaleDateString('en-NG',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
document.getElementById('reportDate').value = todayStr();

/* ── Helpers ── */
function N(n) { return fmtNaira(n||0); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function pill(ok, label) {
  return `<span class="pill-status ${ok?'pill-ok':'pill-none'}">${ok?'✓':'—'} ${label}</span>`;
}
function deptCard(id, icon, title, sub, body, badge='') {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = `<div class="dept-card">
    <div class="dept-header">
      <div class="dept-header-left"><span class="dept-icon">${icon}</span>
        <div><div class="dept-title">${title}</div><div class="dept-sub">${sub}</div></div>
      </div>${badge}
    </div>
    <div class="dept-body">${body}</div>
  </div>`;
}

/* Map manual-report department labels → POS section key */
function deptToSection(dept) {
  const d = (dept||'').toLowerCase().trim();
  if (d === 'barbing salon' || d === 'salon' || d === 'barbing') return 'barbing';
  if (d === 'bar')                                                return 'drinks';
  if (d === 'pool' || d === 'games' || d === 'game')             return 'games';
  if (d === 'restaurant & lounge' || d === 'lounge')             return 'food';
  if (d === 'apartment')                                         return 'apt';
  if (d === 'car rental' || d === 'event' || d === 'events')     return 'events';
  return 'other';
}

/* Aggregate item sales across POS transactions → sorted by revenue */
function topItems(sales) {
  const map = {};
  sales.forEach(s => (s.items||[]).forEach(i => {
    const key = i.name || '—';
    if (!map[key]) map[key] = { qty:0, revenue:0, icon: i.icon||'' };
    map[key].qty     += (i.qty || 1);
    map[key].revenue += (i.total || (i.unitPrice||0) * (i.qty||1));
  }));
  return Object.entries(map).sort((a,b) => b[1].revenue - a[1].revenue);
}

function itemBreakdown(sales, unit) {
  const items = topItems(sales);
  if (!items.length) return '';
  const chips = items.map(([name, d], idx) =>
    `<span class="item-chip" style="${idx===0?'background:rgba(201,169,110,0.18);color:#92400e;font-weight:500':''}">
      ${esc(name)}: ${d.qty} ${unit||'sold'} · ${N(d.revenue)}
    </span>`
  ).join('');
  return `<div style="margin-top:10px"><div class="sub-label" style="margin-bottom:6px">Top Sellers</div><div class="bar-items">${chips}</div></div>`;
}

/* ── Load All ── */
async function loadAll() {
  const date = document.getElementById('reportDate').value;
  document.getElementById('printDate').textContent = 'Date: ' + date;
  document.getElementById('grandBar').style.display = 'none';
  ['gamesCard','drinksCard','foodCard','apartmentCard','eventsCard','barbingCard','expensesCard']
    .forEach(id => { const el = document.getElementById(id); if(el) el.innerHTML=''; });
  loadMonthlySummary();

  const [allSales, barbReports, barStock, kitStock, poolComps, allExpenses, aptRentals] = await Promise.all([
    db.collection('sales').where('date','==',date).get().then(s=>s.docs.map(d=>{
      const r = d.data();
      if (r.source === 'pos') {
        const amt = r.amount || 0;
        const pm  = (r.paymentMethod || '').toLowerCase();
        r.totalSales    = amt;
        r.cashSales     = pm === 'cash'     ? amt : 0;
        r.transferSales = pm === 'transfer' ? amt : 0;
        r.posSales      = pm === 'pos'      ? amt : 0;
      }
      return r;
    })),
    db.collection('barbing_reports').where('date','==',date).get().then(s=>s.docs.map(d=>d.data())),
    db.collection('bar_stock').where('date','==',date).get().then(s=>s.docs.map(d=>d.data())),
    db.collection('kitchen_inventory').where('date','==',date).get().then(s=>s.docs.map(d=>d.data())),
    db.collection('pool_competitions').where('date','==',date).get().then(s=>s.docs.map(d=>d.data())),
    db.collection('expenses').where('date','==',date).get().then(s=>s.docs.map(d=>d.data())),
    (()=>{
      const dayStart = new Date(date + 'T00:00:00');
      const dayEnd   = new Date(date + 'T23:59:59');
      return db.collection('apartmentRentals')
        .where('createdAt','>=',dayStart)
        .where('createdAt','<=',dayEnd)
        .get().then(s=>s.docs.map(d=>({id:d.id,...d.data()}))).catch(()=>[]);
    })(),
  ]);

  // Split POS sales by section field; manual sales by mapped department
  const pos = { games:[], drinks:[], food:[], apt:[], events:[], barbing:[] };
  const manual = { games:[], drinks:[], food:[], apt:[], barbing:[], other:[] };
  allSales.forEach(r => {
    if (r.source === 'pos') {
      const sec = (r.section||'events').toLowerCase();
      (pos[sec] || pos.events).push(r);
    } else {
      const sec = deptToSection(r.department);
      (manual[sec] || manual.other).push(r);
    }
  });

  renderGames(date, pos.games, poolComps, manual.games);
  renderDrinks(date, pos.drinks, barStock, manual.drinks);
  renderFood(date, pos.food, kitStock, manual.food);
  renderApartments(date, pos.apt, manual.apt, aptRentals);
  renderEvents(date, pos.events, manual.other);
  renderBarbing(date, barbReports, pos.barbing, manual.barbing);
  renderExpenses(date, allExpenses);
  renderGrandTotal(allSales, poolComps, allExpenses, aptRentals);
}

/* ── Shared: sales revenue rows ── */
function salesRows(rows) {
  return rows.map(r => {
    const isPos = r.source === 'pos';
    const itemList = isPos && r.items && r.items.length
      ? r.items.map(i=>`${i.qty}× ${esc(i.name)}`).join(', ')
      : '';
    const custLine = isPos && (r.customerName || r.customerPhone)
      ? `<div class="cash-breakdown" style="color:var(--muted)">👤 ${esc(r.customerName||'Guest')}${r.customerPhone ? ' · '+esc(r.customerPhone) : ''}</div>`
      : '';
    const auditLine = isPos
      ? `<div class="cash-breakdown">${(r.paymentMethod||'').toUpperCase()}${r.receivedBy ? ' · Rcvd: '+esc(r.receivedBy) : ''}${itemList ? ' · '+itemList : ''}</div>`
      : `<div class="cash-breakdown">Cash ${N(r.cashSales)} · Trans ${N(r.transferSales)} · POS ${N(r.posSales)}</div>`;
    return `
    <div class="rev-row">
      <div>
        <strong style="font-weight:400">${esc(r.staffName)}</strong>
        ${isPos ? '<span style="font-size:0.68rem;background:rgba(201,169,110,0.15);color:#C9A96E;padding:1px 6px;border-radius:3px;margin-left:6px;letter-spacing:0.06em">POS</span>' : ''}
        ${custLine}
      </div>
      <div style="text-align:right">
        ${auditLine}
        <div style="font-size:0.88rem;font-weight:400">${N(r.totalSales)}</div>
      </div>
    </div>`;
  }).join('');
}
function salesTotal(rows) {
  const tot = rows.reduce((s,r)=>s+(r.totalSales||0),0);
  return `<div class="rev-total"><span>Total</span><span class="text-gold">${N(tot)}</span></div>`;
}

/* ── GAMES ── */
function renderGames(date, posSales, poolComps, manualSales) {
  const hasPOS   = posSales.length > 0;
  const hasComps = poolComps.length > 0;
  const hasManual= manualSales.length > 0;
  if (!hasPOS && !hasComps && !hasManual) {
    deptCard('gamesCard','🎮','Games','Sessions · Revenue',
      `<div class="no-sub">No game activity for ${date}</div>`);
    return;
  }
  let html = '';
  if (hasPOS) {
    const tot = posSales.reduce((s,r)=>s+(r.totalSales||0),0);
    html += `<div class="sub-label">POS Transactions</div>`;
    html += salesRows(posSales);
    html += `<div class="rev-total"><span>POS Total</span><span class="text-gold">${N(tot)}</span></div>`;
    html += itemBreakdown(posSales, 'session');
  }
  if (hasComps) {
    if (hasPOS) html += '<div class="divider"></div>';
    const grandNet = poolComps.reduce((s,r)=>s+(r.netRevenue||0),0);
    html += `<div class="sub-label">Competition Records</div>`;
    html += poolComps.map(r=>{
      const matchList = (r.matches||[]).map(m=>
        `<div class="match-row"><span style="color:var(--muted)">${esc(m.player1||'')} vs ${esc(m.player2||'')}</span>
         <span style="margin-left:auto">${N(m.stake||0)}</span></div>`
      ).join('');
      return `<div class="rev-row" style="flex-direction:column;align-items:flex-start;gap:6px">
        <div style="display:flex;width:100%;justify-content:space-between">
          <span><strong style="font-weight:400">${esc(r.type||'Competition')}</strong> · ${r.players||0} players</span>
          <span class="cash-breakdown">by ${esc(r.staffName)}</span>
        </div>
        ${matchList}
        <div style="display:flex;gap:18px;font-size:0.78rem">
          <span>Cash <strong class="text-ok">${N(r.cashCollected)}</strong></span>
          <span>Prize <strong style="color:var(--err)">${N(r.prizePaid)}</strong></span>
          <span>Net <strong class="text-gold">${N(r.netRevenue)}</strong></span>
        </div>
      </div>`;
    }).join('');
    html += `<div class="rev-total"><span>Competition Net</span><span class="text-gold">${N(grandNet)}</span></div>`;
  }
  if (hasManual) {
    if (hasPOS || hasComps) html += '<div class="divider"></div>';
    html += `<div class="sub-label">Manual Reports</div>`;
    html += salesRows(manualSales) + salesTotal(manualSales);
  }
  const posTot  = posSales.reduce((s,r)=>s+(r.totalSales||0),0);
  const compTot = poolComps.reduce((s,r)=>s+(r.netRevenue||0),0);
  const manTot  = manualSales.reduce((s,r)=>s+(r.totalSales||0),0);
  const total   = posTot + compTot + manTot;
  deptCard('gamesCard','🎮','Games',`${posSales.length} POS · ${poolComps.length} comp · ${manualSales.length} manual`,
    html, `<span class="pill-status pill-ok">${N(total)}</span>`);
}

/* ── DRINKS & BAR ── */
function renderDrinks(date, posSales, barStock, manualSales) {
  const hasPOS    = posSales.length > 0;
  const hasStock  = barStock.length > 0;
  const hasManual = manualSales.length > 0;
  if (!hasPOS && !hasStock && !hasManual) {
    deptCard('drinksCard','🍺','Drinks & Bar','Stock · Revenue',
      `<div class="no-sub">No bar activity for ${date}</div>`);
    return;
  }
  let html = '';
  if (hasPOS) {
    const tot = posSales.reduce((s,r)=>s+(r.totalSales||0),0);
    html += `<div class="sub-label">POS Transactions</div>`;
    html += salesRows(posSales);
    html += `<div class="rev-total"><span>POS Total</span><span class="text-gold">${N(tot)}</span></div>`;
    html += itemBreakdown(posSales, 'served');
  }
  if (hasStock) {
    if (hasPOS) html += '<div class="divider"></div>';
    html += `<div class="sub-label">Stock Inventory</div>`;
    html += barStock.map(r => {
      const low = r.lowItems||[];
      const chips = (r.items||[]).map(it=>
        `<span class="item-chip${it.lowAlert?' low':''}">${esc(it.name)}: ${it.closing}${it.unit||''}</span>`
      ).join('');
      return `<div style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-size:0.84rem;font-weight:400">${esc(r.staffName)}</span>
          ${low.length?`<span class="pill-status pill-warn">${low.length} low</span>`:`<span class="pill-status pill-ok">All OK</span>`}
        </div>
        <div class="bar-items">${chips}</div>
        ${r.notes?`<p style="font-size:0.75rem;color:var(--muted);margin-top:6px">Note: ${esc(r.notes)}</p>`:''}
      </div>`;
    }).join('<div class="divider"></div>');
  }
  if (hasManual) {
    if (hasPOS || hasStock) html += '<div class="divider"></div>';
    html += `<div class="sub-label">Manual Reports</div>`;
    html += salesRows(manualSales) + salesTotal(manualSales);
  }
  const total = posSales.reduce((s,r)=>s+(r.totalSales||0),0) + manualSales.reduce((s,r)=>s+(r.totalSales||0),0);
  deptCard('drinksCard','🍺','Drinks & Bar',`${posSales.length} POS · ${barStock.length} stock · ${manualSales.length} manual`,
    html, total > 0 ? `<span class="pill-status pill-ok">${N(total)}</span>` : pill(false,'0 filed'));
}

/* ── FOOD & RESTAURANT ── */
function renderFood(date, posSales, kitStock, manualSales) {
  const hasPOS    = posSales.length > 0;
  const hasStock  = kitStock.length > 0;
  const hasManual = manualSales.length > 0;
  if (!hasPOS && !hasStock && !hasManual) {
    deptCard('foodCard','🍽️','Food & Restaurant','Kitchen · Revenue',
      `<div class="no-sub">No food activity for ${date}</div>`);
    return;
  }
  let html = '';
  if (hasPOS) {
    const tot = posSales.reduce((s,r)=>s+(r.totalSales||0),0);
    html += `<div class="sub-label">POS Transactions</div>`;
    html += salesRows(posSales);
    html += `<div class="rev-total"><span>POS Total</span><span class="text-gold">${N(tot)}</span></div>`;
    html += itemBreakdown(posSales, 'served');
  }
  if (hasStock) {
    if (hasPOS) html += '<div class="divider"></div>';
    html += `<div class="sub-label">Kitchen Inventory</div>`;
    html += kitStock.map(r => {
      const low = r.lowItems||[];
      const chips = (r.items||[]).map(it=>
        `<span class="item-chip${it.lowAlert?' low':''}">${esc(it.name)}: ${it.closing}${it.unit||''}</span>`
      ).join('');
      return `<div style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div>
            <span style="font-size:0.84rem;font-weight:400">${esc(r.staffName)}</span>
            <span style="font-size:0.75rem;color:var(--muted);margin-left:10px">${r.meals||0} meals prepared</span>
          </div>
          ${low.length?`<span class="pill-status pill-warn">${low.length} low</span>`:`<span class="pill-status pill-ok">All OK</span>`}
        </div>
        <div class="bar-items">${chips}</div>
        ${r.notes?`<p style="font-size:0.75rem;color:var(--muted);margin-top:6px">Note: ${esc(r.notes)}</p>`:''}
      </div>`;
    }).join('<div class="divider"></div>');
  }
  if (hasManual) {
    if (hasPOS || hasStock) html += '<div class="divider"></div>';
    html += `<div class="sub-label">Manual Reports</div>`;
    html += salesRows(manualSales) + salesTotal(manualSales);
  }
  const total = posSales.reduce((s,r)=>s+(r.totalSales||0),0) + manualSales.reduce((s,r)=>s+(r.totalSales||0),0);
  deptCard('foodCard','🍽️','Food & Restaurant',`${posSales.length} POS · ${kitStock.length} kitchen · ${manualSales.length} manual`,
    html, total > 0 ? `<span class="pill-status pill-ok">${N(total)}</span>` : pill(false,'0 filed'));
}

/* ── EVENTS & CUSTOM ── */
function renderEvents(date, posSales, otherManual) {
  const hasPOS    = posSales.length > 0;
  const hasManual = otherManual.length > 0;
  if (!hasPOS && !hasManual) return;
  let html = '';
  if (hasPOS) {
    const tot = posSales.reduce((s,r)=>s+(r.totalSales||0),0);
    html += `<div class="sub-label">POS — Events & Custom</div>`;
    html += salesRows(posSales);
    html += `<div class="rev-total"><span>Total</span><span class="text-gold">${N(tot)}</span></div>`;
  }
  if (hasManual) {
    if (hasPOS) html += '<div class="divider"></div>';
    html += `<div class="sub-label">Other Revenue</div>`;
    html += salesRows(otherManual) + salesTotal(otherManual);
  }
  const total = posSales.reduce((s,r)=>s+(r.totalSales||0),0) + otherManual.reduce((s,r)=>s+(r.totalSales||0),0);
  deptCard('eventsCard','🎪','Events & Custom',`${posSales.length + otherManual.length} record${(posSales.length+otherManual.length)!==1?'s':''}`,
    html, `<span class="pill-status pill-ok">${N(total)}</span>`);
}

/* ── BARBING SALON ── */
function renderBarbing(date, reports, posSales, salonSales) {
  const hasRep = reports.length > 0, hasPOS = posSales.length > 0, hasSales = salonSales.length > 0;
  if (!hasRep && !hasPOS && !hasSales) {
    deptCard('barbingCard','💈','Barbing Salon','Services · Revenue',
      `<div class="no-sub">No salon submissions for ${date}</div>`);
    return;
  }

  // Detect duplicate: staff who already have POS sales should not also count in service reports
  const posStaffIds = new Set(posSales.map(r => r.staffId).filter(Boolean));
  const posStaffNames = new Set(posSales.map(r => (r.staffName||'').toLowerCase()).filter(Boolean));
  const isDuplicate = r => posStaffIds.has(r.staffId) || posStaffNames.has((r.staffName||'').toLowerCase());
  const dupReports  = reports.filter(r => isDuplicate(r));
  const realReports = reports.filter(r => !isDuplicate(r));

  let html = '';

  // Duplicate warning banner
  if (dupReports.length > 0) {
    const names = [...new Set(dupReports.map(r=>r.staffName))].join(', ');
    html += `<div style="background:rgba(234,179,8,0.1);border:1px solid rgba(234,179,8,0.35);border-radius:6px;padding:10px 14px;margin-bottom:12px;font-size:0.78rem;color:#ca8a04">
      ⚠️ <strong>Duplicate detected</strong> — ${esc(names)} submitted a manual service report AND logged POS sales for this date.
      The service report has been excluded from totals. Staff should use POS only.
    </div>`;
  }

  if (hasPOS) {
    const tot = posSales.reduce((s,r)=>s+(r.totalSales||0),0);
    html += `<div class="sub-label">POS Transactions</div>`;
    html += salesRows(posSales);
    html += `<div class="rev-total"><span>POS Total</span><span class="text-gold">${N(tot)}</span></div>`;
    html += itemBreakdown(posSales, 'served');
  }

  // Only show non-duplicate service reports
  if (realReports.length > 0) {
    if (hasPOS) html += '<div class="divider"></div>';
    const grandRev  = realReports.reduce((s,r)=>s+(r.totalRevenue||0),0);
    const grandSvcs = realReports.reduce((s,r)=>s+(r.clientsServed||0),0);
    html += `<div class="sub-label">Service Reports</div>`;
    html += realReports.map(r=>{
      const svcs = (r.services||[]).map(s=>`${s.type} ${N(s.amount)}`).join(' · ');
      return `<div class="rev-row">
        <div>
          <strong style="font-weight:400">${esc(r.staffName)}</strong>
          <div class="cash-breakdown">${svcs||'No services listed'}</div>
          ${r.notes?`<div class="cash-breakdown">Note: ${esc(r.notes)}</div>`:''}
        </div>
        <div style="text-align:right">
          <div class="cash-breakdown">${r.clientsServed||0} clients</div>
          <div style="font-weight:400;color:var(--gold)">${N(r.totalRevenue)}</div>
        </div>
      </div>`;
    }).join('');
    html += `<div class="rev-total"><span>Services — ${grandSvcs} clients</span><span class="text-gold">${N(grandRev)}</span></div>`;
  }

  // Show duplicate reports collapsed with a strikethrough note
  if (dupReports.length > 0) {
    html += `<div class="divider"></div>`;
    html += `<div class="sub-label" style="color:#ca8a04">⚠️ Excluded (Duplicate Service Reports)</div>`;
    html += dupReports.map(r=>{
      const svcs = (r.services||[]).map(s=>`${s.type} ${N(s.amount)}`).join(' · ');
      return `<div class="rev-row" style="opacity:0.45">
        <div>
          <strong style="font-weight:400;text-decoration:line-through">${esc(r.staffName)}</strong>
          <div class="cash-breakdown">${svcs||'No services listed'}</div>
        </div>
        <div style="text-align:right;text-decoration:line-through;color:var(--gold)">${N(r.totalRevenue)}</div>
      </div>`;
    }).join('');
  }

  if (hasSales) {
    if (hasRep || hasPOS) html += '<div class="divider"></div>';
    html += `<div class="sub-label">Manual Reports</div>`;
    html += salesRows(salonSales);
    html += salesTotal(salonSales);
  }

  // Total excludes duplicate service reports
  const posTot = posSales.reduce((s,r)=>s+(r.totalSales||0),0);
  const repTot = realReports.reduce((s,r)=>s+(r.totalRevenue||0),0);
  const manTot = salonSales.reduce((s,r)=>s+(r.totalSales||0),0);
  const total  = posTot + repTot + manTot;
  const count  = reports.length + posSales.length + salonSales.length;
  deptCard('barbingCard','💈','Barbing Salon',`${count} submission${count!==1?'s':''}`,
    html, total > 0 ? `<span class="pill-status pill-ok">${N(total)}</span>` : pill(false, count+' filed'));
}

/* ── APARTMENT RENTALS ── */
function aptNights(cin, cout) {
  try { return Math.max(1, Math.round((new Date(cout) - new Date(cin)) / 86400000)); } catch { return 1; }
}
function renderApartments(date, posSales, manualSales, rentals) {
  const hasPOS     = posSales.length > 0;
  const hasManual  = manualSales.length > 0;
  const hasRentals = rentals.length > 0;
  if (!hasPOS && !hasManual && !hasRentals) return;

  let html = '';
  if (hasPOS) {
    const tot = posSales.reduce((s,r)=>s+(r.totalSales||0),0);
    html += `<div class="sub-label">POS Transactions</div>`;
    html += salesRows(posSales);
    html += `<div class="rev-total"><span>POS Total</span><span class="text-gold">${N(tot)}</span></div>`;
  }
  if (hasRentals) {
    if (hasPOS) html += '<div class="divider"></div>';
    const totalPaid    = rentals.reduce((s,r)=>s+(r.paid||0), 0);
    const totalBalance = rentals.reduce((s,r)=>s+(r.balance||0), 0);
    html += `<div class="sub-label">Rental Bookings</div>`;
    html += rentals.map(r => {
      const nights = r.nights || aptNights(r.checkin, r.checkout);
      const sCls   = r.payStatus==='paid' ? 'pill-ok' : r.payStatus==='partial' ? 'pill-warn' : 'pill-none';
      return `<div class="rev-row">
        <div>
          <strong style="font-weight:400">${esc(r.guestName)}</strong>
          <div class="cash-breakdown">Unit ${esc(r.unit||'—')}${r.bedrooms?' · '+r.bedrooms+' Bed':''} · ${nights} night${nights!==1?'s':''} · out ${esc(r.checkout||'—')}</div>
          ${r.notes?`<div class="cash-breakdown">Note: ${esc(r.notes)}</div>`:''}
        </div>
        <div style="text-align:right">
          <span class="pill-status ${sCls}" style="margin-bottom:4px">${r.payStatus||'pending'}</span>
          <div class="cash-breakdown">Total ${N(r.total)} · Paid ${N(r.paid)}</div>
          ${r.balance>0?`<div class="cash-breakdown" style="color:#fca5a5">Bal ${N(r.balance)}</div>`:''}
        </div>
      </div>`;
    }).join('');
    html += `<div class="rev-total"><span>Rentals Paid — ${rentals.length} guest${rentals.length!==1?'s':''}</span><span class="text-gold">${N(totalPaid)}</span></div>`;
    if (totalBalance > 0) html += `<div style="display:flex;justify-content:space-between;font-size:0.8rem;color:#fca5a5;padding:4px 0 2px"><span>Outstanding Balance</span><span>${N(totalBalance)}</span></div>`;
  }
  if (hasManual) {
    if (hasPOS || hasRentals) html += '<div class="divider"></div>';
    html += `<div class="sub-label">Manual Reports</div>`;
    html += manualSales.map(r=>`
      <div class="rev-row">
        <div>
          <strong style="font-weight:400">${esc(r.staffName)}</strong>
          ${r.aptUnit?`<div class="cash-breakdown">🏨 ${esc(r.aptUnit)}${r.aptBedrooms?' · '+r.aptBedrooms+' Bed':''}${r.aptGuest?' · '+esc(r.aptGuest):''}</div>`:''}
          ${r.aptCheckin?`<div class="cash-breakdown">📅 ${esc(r.aptCheckin)} → ${esc(r.aptCheckout||'—')}</div>`:''}
        </div>
        <div style="text-align:right">
          <div class="cash-breakdown">Cash ${N(r.cashSales)} · Trans ${N(r.transferSales)} · POS ${N(r.posSales)}</div>
          <div style="font-size:0.88rem;font-weight:400">${N(r.totalSales)}</div>
        </div>
      </div>`).join('');
    html += salesTotal(manualSales);
  }
  const aptRev = posSales.reduce((s,r)=>s+(r.totalSales||0),0)
               + rentals.reduce((s,r)=>s+(r.paid||0),0)
               + manualSales.reduce((s,r)=>s+(r.totalSales||0),0);
  const count  = posSales.length + rentals.length + manualSales.length;
  deptCard('apartmentCard','🏠','Apartment Rentals',
    `${count} record${count!==1?'s':''}`, html,
    aptRev > 0 ? `<span class="pill-status pill-ok">${N(aptRev)}</span>` : '');
}

/* ── EXPENSES ── */
function renderExpenses(date, rows) {
  const el = document.getElementById('expensesCard');
  if (!el) return;
  if (!rows.length) {
    el.innerHTML = `<div class="dept-card">
      <div class="dept-header">
        <div class="dept-header-left"><span class="dept-icon">🧾</span>
          <div><div class="dept-title">Daily Expenses</div><div class="dept-sub">Logged staff expenses</div></div>
        </div>
      </div>
      <div class="dept-body"><div class="no-sub">No expenses logged for ${date}</div></div>
    </div>`;
    return;
  }

  // Group by department
  const byDept = {};
  rows.forEach(r => {
    const k = r.department || 'other';
    if (!byDept[k]) byDept[k] = [];
    byDept[k].push(r);
  });

  const deptLabels = {
    salon: 'Barbing Salon', lounge: 'Lounge', bar: 'Bar',
    kitchen: 'Kitchen', apartment: 'Apartment', pool: 'Pool', management: 'Management'
  };

  let html = '';
  let grandTotal = 0;

  Object.entries(byDept).forEach(([dept, items]) => {
    const deptTotal = items.reduce((s, e) => s + (e.amount || 0), 0);
    grandTotal += deptTotal;
    html += `<div class="sub-label">${esc(deptLabels[dept] || dept)}</div>`;
    html += items.map(e => {
      const receipt = e.photoUrl
        ? `<a href="${e.photoUrl}" target="_blank" style="color:var(--gold);font-size:0.75rem">View</a>`
        : '<span style="color:var(--muted)">—</span>';
      return `<div class="rev-row">
        <div>
          <strong style="font-weight:400">${esc(e.staffName)}</strong>
          <div class="cash-breakdown">${esc(e.category)} · ${esc(e.description)}</div>
          ${e.notes ? `<div class="cash-breakdown">Note: ${esc(e.notes)}</div>` : ''}
        </div>
        <div style="text-align:right">
          ${receipt}
          <div style="font-weight:400;color:var(--gold);font-size:0.88rem">${N(e.amount)}</div>
        </div>
      </div>`;
    }).join('');
    html += `<div style="display:flex;justify-content:flex-end;font-size:0.8rem;color:var(--gold);padding:5px 0 10px;border-bottom:1px solid var(--border);margin-bottom:8px">${N(deptTotal)}</div>`;
  });

  html += `<div class="rev-total" style="margin-top:0"><span>Total Expenses</span><span style="color:#ef4444">${N(grandTotal)}</span></div>`;

  el.innerHTML = `<div class="dept-card">
    <div class="dept-header">
      <div class="dept-header-left"><span class="dept-icon">🧾</span>
        <div><div class="dept-title">Daily Expenses</div><div class="dept-sub">${rows.length} expense${rows.length !== 1 ? 's' : ''} logged</div></div>
      </div>
      <span class="pill-status pill-warn">Total: ${N(grandTotal)}</span>
    </div>
    <div class="dept-body">${html}</div>
  </div>`;
}

/* ── GRAND TOTAL ── */
function renderGrandTotal(allSales, poolComps, allExpenses, aptRentals) {
  const salesTot     = allSales.reduce((s,r)=>s+(r.totalSales||0),0);
  const compNet      = poolComps.reduce((s,r)=>s+(r.netRevenue||0),0);
  const aptRentalRev = (aptRentals||[]).reduce((s,r)=>s+(r.paid||0),0);
  const gross        = salesTot + compNet + aptRentalRev;
  if (!gross) return;

  const totalExp = (allExpenses||[]).reduce((s,e)=>s+(e.amount||0),0);
  const netDay   = gross - totalExp;
  const isProfit = netDay >= 0;

  // Chips by POS section + manual category
  const bySec = {};
  allSales.forEach(r => {
    const key = r.source === 'pos'
      ? ({ games:'🎮 Games', drinks:'🍺 Drinks', food:'🍽️ Food', apt:'🏠 Apartment', events:'🎪 Events', barbing:'💈 Salon' }[r.section] || '🎪 Events')
      : (r.department || 'Other');
    bySec[key] = (bySec[key]||0) + (r.totalSales||0);
  });
  if (compNet > 0)      bySec['🏊 Competitions'] = compNet;
  if (aptRentalRev > 0) bySec['🏠 Apt Rentals']  = aptRentalRev;

  const chips = Object.entries(bySec)
    .filter(([,t])=>t>0)
    .map(([k,t])=>`<div class="gt-chip">${esc(k)} <strong>${N(t)}</strong></div>`)
    .join('');

  document.getElementById('grandTotal').textContent = N(gross);
  document.getElementById('grandChips').innerHTML   = chips;
  document.getElementById('grandBar').style.display = 'flex';

  const netEl = document.getElementById('grandNet');
  if (netEl && totalExp > 0) {
    netEl.innerHTML = `
      <div class="gn-item">Expenses <strong style="color:#fca5a5">${N(totalExp)}</strong></div>
      <div class="gn-item">Daily Net <strong style="color:${isProfit?'#86efac':'#fca5a5'}">${isProfit?'+':''}${N(netDay)}</strong></div>`;
  } else if (netEl) { netEl.innerHTML = ''; }
}

/* ── MONTHLY FINANCIAL SUMMARY ── */
async function loadMonthlySummary() {
  const date = document.getElementById('reportDate').value;
  if (!date) return;
  const [yr, mo] = date.split('-');
  const monthStart = `${yr}-${mo}-01`;
  const lastDay    = new Date(+yr, +mo, 0).getDate();
  const monthEnd   = `${yr}-${mo}-${String(lastDay).padStart(2,'0')}`;
  const monthName  = new Date(+yr, +mo - 1, 1).toLocaleDateString('en-NG', {month:'long', year:'numeric'});

  try {
    const [salesSnap, expSnap, aptSnap] = await Promise.all([
      db.collection('sales').where('date','>=',monthStart).where('date','<=',monthEnd).get(),
      db.collection('expenses').where('date','>=',monthStart).where('date','<=',monthEnd).get(),
      db.collection('apartmentRentals').where('checkin','>=',monthStart).where('checkin','<=',monthEnd).get().catch(()=>({docs:[]})),
    ]);

    const mSales   = salesSnap.docs.map(d => {
      const r = d.data();
      if (r.source === 'pos') r.totalSales = r.amount || 0;
      return r;
    });
    const mExp     = expSnap.docs.map(d => d.data());
    const mAptRent = aptSnap.docs.map(d => d.data());

    const totalSales  = mSales.reduce((s,r)   => s + (r.totalSales||0), 0);
    const aptRentRev  = mAptRent.reduce((s,r) => s + (r.paid||0),       0);
    const totalRev    = totalSales + aptRentRev;
    const totalExp    = mExp.reduce((s,r)     => s + (r.amount||0),     0);
    const net         = totalRev - totalExp;

    // Top expense categories
    const byCat = {};
    mExp.forEach(e => { const k = e.category||'Other'; byCat[k] = (byCat[k]||0) + (e.amount||0); });
    const catChips = Object.entries(byCat).sort((a,b)=>b[1]-a[1])
      .map(([cat,amt]) => `<span class="item-chip">${esc(cat)} <strong>${N(amt)}</strong></span>`)
      .join('');

    // Expense by department (for sub-text)
    const byDeptExp = {};
    mExp.forEach(e => { const k = e.department||'other'; byDeptExp[k] = (byDeptExp[k]||0) + (e.amount||0); });
    const deptLabels = { salon:'Salon', lounge:'Lounge', bar:'Bar', kitchen:'Kitchen', apartment:'Apt', pool:'Pool', management:'Mgmt' };
    const deptExpSub = Object.entries(byDeptExp).sort((a,b)=>b[1]-a[1])
      .slice(0,3).map(([k,v]) => `${deptLabels[k]||k} ${N(v)}`).join(' · ');

    const isProfit = net >= 0;

    document.getElementById('msRevenueLabel').textContent = monthName + ' — Revenue';
    document.getElementById('msRevenue').textContent      = N(totalRev);
    document.getElementById('msRevenueSub').textContent   = mSales.length + ' submission' + (mSales.length!==1?'s':'')
      + (aptRentRev > 0 ? ' · Apt Rentals ' + N(aptRentRev) : '');

    document.getElementById('msExpLabel').textContent     = monthName + ' — Expenses';
    document.getElementById('msExpenses').textContent     = N(totalExp);
    document.getElementById('msExpSub').textContent       = mExp.length + ' expense' + (mExp.length!==1?'s':'') + (deptExpSub ? ' · ' + deptExpSub : '');
    document.getElementById('msCatChips').innerHTML       = catChips;

    document.getElementById('msNetLabel').textContent     = monthName + ' — Net Profit';
    const netEl = document.getElementById('msNet');
    netEl.textContent   = (isProfit ? '+' : '') + N(net);
    netEl.className     = 'ms-val ' + (isProfit ? 'ms-green' : 'ms-red');
    document.getElementById('msNetSub').textContent       = isProfit ? 'Operating surplus' : 'Operating deficit';
    const netCard = document.getElementById('msNetCard');
    netCard.className   = 'ms-card ' + (isProfit ? 'profit-pos' : 'profit-neg');

    document.getElementById('monthlySummary').style.display = 'grid';
  } catch(e) {
    console.error('Monthly summary:', e);
  }
}

loadAll();
loadMonthlySummary();
</script>
