<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Sales · Eden 54 Portal</title>
<link rel="icon" type="image/jpeg" href="/logo/eden 54 logo.jpeg">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/portal/portal.css">
</head>
<body>
<div class="sb-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="sb-brand"><div class="sb-brand-name">Eden 54</div><div class="sb-brand-sub">Staff Portal</div></div>
  <nav class="sb-nav" id="sbNav"></nav>
  <div class="sb-foot"><div id="sidebarUser"></div><a class="sb-item" onclick="switchProfile()" style="cursor:pointer"><i class="sb-icon">🔄</i> Switch Profile</a></div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="hamburger" onclick="toggleSidebar()"><div></div><div></div><div></div></button>
      <h1>Daily Sales Report</h1>
    </div>
    <div class="topbar-date" id="topDate"></div>
  </div>
  <div class="content">
    <div id="alertBox" class="alert"></div>
    <div class="g2">
      <div class="card">
        <div class="section-head"><h2>Submit Sales</h2></div>
        <div class="fg2" style="margin-bottom:14px">
          <div class="form-group">
            <label class="form-label">Date</label>
            <input type="date" id="saleDate" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Department</label>
            <select id="saleDept" class="form-control" onchange="onDeptChange()">
              <option value="">Select…</option>
            </select>
          </div>
        </div>

        <!-- Service breakdown — shown only for Barbing Salon -->
        <div id="svcSection" style="display:none;margin-bottom:14px">
          <div class="divider"></div>
          <p style="font-size:0.7rem;color:#6a6b62;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px">Services Rendered</p>
          <div id="svcGrid" style="display:grid;gap:4px"></div>
        </div>

        <!-- Apartment details — shown only for Apartment dept -->
        <div id="aptSection" style="display:none;margin-bottom:14px">
          <div class="divider"></div>
          <p style="font-size:0.7rem;color:#6a6b62;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px">Apartment Details</p>
          <div class="fg2" style="margin-bottom:10px">
            <div class="form-group">
              <label class="form-label">Unit Type</label>
              <select id="aptUnit" class="form-control">
                <option value="">Select unit…</option>
                <option>1-Bedroom Suite</option>
                <option>2-Bedroom Suite</option>
                <option>3-Bedroom Suite</option>
                <option>Studio</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">No. of Bedrooms</label>
              <select id="aptBedrooms" class="form-control">
                <option value="">Select…</option>
                <option value="1">1 Bedroom</option>
                <option value="2">2 Bedrooms</option>
                <option value="3">3 Bedrooms</option>
              </select>
            </div>
          </div>
          <div class="form-group" style="margin-bottom:10px">
            <label class="form-label">Guest Name</label>
            <input type="text" id="aptGuest" class="form-control" placeholder="Guest full name">
          </div>
          <div class="fg2">
            <div class="form-group">
              <label class="form-label">Check-in Date</label>
              <input type="date" id="aptCheckin" class="form-control">
            </div>
            <div class="form-group">
              <label class="form-label">Check-out Date</label>
              <input type="date" id="aptCheckout" class="form-control">
            </div>
          </div>
        </div>

        <div class="divider"></div>
        <div class="fg3" style="margin-bottom:14px">
          <div class="form-group">
            <label class="form-label">Cash (₦)</label>
            <input type="number" id="cashSales" class="form-control" placeholder="0" min="0" oninput="calcTotal()">
          </div>
          <div class="form-group">
            <label class="form-label">Transfer (₦)</label>
            <input type="number" id="transferSales" class="form-control" placeholder="0" min="0" oninput="calcTotal()">
          </div>
          <div class="form-group">
            <label class="form-label">POS (₦)</label>
            <input type="number" id="posSales" class="form-control" placeholder="0" min="0" oninput="calcTotal()">
          </div>
        </div>
        <div class="card" style="background:#f5f9f5;border-color:#C9A96E;padding:14px;margin-bottom:16px">
          <div class="card-label">Total</div>
          <div class="card-value gold" id="totalDisplay">₦0.00</div>
        </div>
        <div class="form-group" style="margin-bottom:16px">
          <label class="form-label">Notes</label>
          <textarea id="saleNotes" class="form-control" rows="2" placeholder="Any notes…"></textarea>
        </div>
        <button class="btn btn-gold" id="submitBtn" onclick="submitSales()" style="width:100%">Submit Report</button>
      </div>

      <div class="card">
        <div class="section-head"><h2 id="todayTitle">My Sales Today</h2></div>
        <div id="todaySales" class="text-muted" style="font-size:0.85rem">Loading…</div>
        <div class="divider"></div>
        <div class="section-head" style="margin-top:0"><h2>My Recent History</h2></div>
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>Date</th><th>Dept</th><th>Total</th></tr></thead>
            <tbody id="historyTable"><tr><td colspan="3" style="text-align:center;padding:16px;color:#6a6b62">Loading…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/portal/firebase-init.js"></script>
<script>
const staff = getStaff();
populateSidebar(staff);
buildNav(staff, 'sales');
const today = todayStr();
document.getElementById('saleDate').value = today;
document.getElementById('topDate').textContent = new Date().toLocaleDateString('en-NG',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

/* ── Department options ── */
const ALL_DEPTS = ['Restaurant & Lounge','Bar','Apartment','Barbing Salon','Pool','Car Rental','Games'];
const SALON_DEPTS = ['Barbing Salon','Pool','Games'];
const APT_DEPTS   = ['Apartment'];
const dept_key    = (staff.department || '').toLowerCase();
const isSalon = dept_key === 'salon';
const isApt   = dept_key === 'apartment';

const SALON_SERVICES = ['Haircut', 'Games', 'Pool'];

function buildDeptOptions() {
  const sel = document.getElementById('saleDept');
  const opts = isSalon ? SALON_DEPTS : isApt ? APT_DEPTS : ALL_DEPTS;
  sel.innerHTML = '<option value="">Select…</option>' +
    opts.map(d => `<option${(isSalon && d==='Barbing Salon') || (isApt && d==='Apartment') ? ' selected' : ''}>${d}</option>`).join('');
  if (isSalon || isApt) onDeptChange();
}

function onDeptChange() {
  const dept = document.getElementById('saleDept').value;
  const showSvc = dept === 'Barbing Salon';
  const showApt = dept === 'Apartment';
  document.getElementById('svcSection').style.display = showSvc ? 'block' : 'none';
  document.getElementById('aptSection').style.display = showApt ? 'block' : 'none';
  if (showSvc) buildSvcGrid();
  calcTotal();
}

function buildSvcGrid() {
  const grid = document.getElementById('svcGrid');
  grid.innerHTML = SALON_SERVICES.map(name =>
    `<div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:#f9f9f7;border-radius:6px">
      <input type="checkbox" class="svc-check" data-type="${name}" id="chk_${name}" onchange="toggleSvcAmt('${name}')" style="width:16px;height:16px;cursor:pointer;accent-color:#C9A96E">
      <label for="chk_${name}" style="font-size:0.88rem;cursor:pointer;flex:1">${name}</label>
      <input type="number" class="form-control svc-amt" id="amt_${name}" data-type="${name}" min="0" placeholder="₦ amount" style="width:120px;display:none" oninput="calcTotal()">
    </div>`
  ).join('');
}

function toggleSvcAmt(name) {
  const checked = document.getElementById('chk_' + name).checked;
  const amtEl = document.getElementById('amt_' + name);
  amtEl.style.display = checked ? 'block' : 'none';
  if (!checked) { amtEl.value = ''; }
  calcTotal();
}

function getSvcBreakdown() {
  return SALON_SERVICES
    .filter(name => document.getElementById('chk_' + name)?.checked)
    .map(name => ({ type: name, amount: +document.getElementById('amt_' + name)?.value || 0 }))
    .filter(s => s.amount > 0);
}

function calcTotal() {
  const dept = document.getElementById('saleDept').value;
  const t = (+document.getElementById('cashSales').value||0)+(+document.getElementById('transferSales').value||0)+(+document.getElementById('posSales').value||0);
  document.getElementById('totalDisplay').textContent = fmtNaira(t);
}

async function submitSales() {
  const date = document.getElementById('saleDate').value;
  const dept = document.getElementById('saleDept').value;
  if (!date || !dept) { showAlert('alertBox','Please select a date and department.','alert-error'); return; }
  const cash  = +document.getElementById('cashSales').value || 0;
  const trans = +document.getElementById('transferSales').value || 0;
  const pos   = +document.getElementById('posSales').value || 0;
  const notes = document.getElementById('saleNotes').value.trim();
  const services = dept === 'Barbing Salon' ? getSvcBreakdown() : [];
  const aptDetails = dept === 'Apartment' ? {
    aptUnit:     document.getElementById('aptUnit').value,
    aptBedrooms: document.getElementById('aptBedrooms').value,
    aptGuest:    document.getElementById('aptGuest').value.trim(),
    aptCheckin:  document.getElementById('aptCheckin').value,
    aptCheckout: document.getElementById('aptCheckout').value,
  } : {};
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Submitting…';
  try {
    await db.collection('sales').add({
      date, department: dept, staffId: staff.id, staffName: staff.name,
      cashSales: cash, transferSales: trans, posSales: pos, totalSales: cash + trans + pos,
      services, notes, ...aptDetails,
      submittedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    showAlert('alertBox','Sales report submitted!','alert-success');
    ['cashSales','transferSales','posSales','saleNotes','aptUnit','aptBedrooms','aptGuest','aptCheckin','aptCheckout']
      .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
    document.getElementById('totalDisplay').textContent = '₦0.00';
    if (dept === 'Barbing Salon') { buildSvcGrid(); }
    loadToday(); loadHistory();
  } catch(e) { showAlert('alertBox','Error submitting. Try again.','alert-error'); }
  btn.disabled = false; btn.textContent = 'Submit Report';
}

async function loadToday() {
  const lvl       = (staff.accessLevel || staff.role || '').toLowerCase().replace(/\s+/g,'');
  const isManager = ['ceo','superadmin','manager'].includes(lvl);
  const isHR      = lvl === 'hr' || (staff.department || '').toLowerCase() === 'hr';
  const seeAll    = isManager || isHR;

  if (seeAll) document.getElementById('todayTitle').textContent = "Today's Activity — All Staff";

  // Fetch both manual sales reports and POS transactions for today
  const queries = seeAll
    ? [db.collection('sales').where('date','==',today).get(),
       db.collection('sales').where('date','==',today).where('source','==','pos').get()]
    : [db.collection('sales').where('date','==',today).where('staffId','==',staff.id).get(),
       db.collection('sales').where('date','==',today).where('source','==','pos').where('staffId','==',staff.id).get()];

  const [manualSnap, posSnap] = await Promise.all(queries);
  const el = document.getElementById('todaySales');

  // Manual reports (exclude pos-sourced ones to avoid double-counting)
  const manualDocs = manualSnap.docs.filter(d => d.data().source !== 'pos');
  // POS transactions — deduplicate with posSnap
  const posDocs    = posSnap.docs;

  if (!manualDocs.length && !posDocs.length) { el.textContent = 'No submissions yet today.'; return; }

  let html = '', grandManual = 0, grandPOS = 0;

  if (manualDocs.length) {
    html += `<div style="font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:#C9A96E;margin:6px 0 4px">Manual Reports</div>`;
    manualDocs.forEach(d => {
      const s = d.data(); grandManual += s.totalSales || 0;
      const label = seeAll ? `<strong>${s.staffName}</strong> · ${s.department}` : s.department;
      html += `<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #e4e4df;font-size:0.84rem"><span>${label}</span><span class="text-gold fw4">${fmtNaira(s.totalSales)}</span></div>`;
    });
    if (seeAll) html += `<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:0.82rem;color:#6a6b62"><span>Subtotal</span><span>${fmtNaira(grandManual)}</span></div>`;
  }

  if (posDocs.length) {
    html += `<div style="font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:#C9A96E;margin:12px 0 4px">POS Transactions</div>`;
    posDocs.forEach(d => {
      const s = d.data(); grandPOS += s.amount || 0;
      const time = s.createdAt?.toDate ? s.createdAt.toDate().toLocaleTimeString('en-NG',{hour:'2-digit',minute:'2-digit'}) : '';
      const who  = seeAll ? `<strong>${s.staffName}</strong> · ${s.section || s.department}` : (s.section || s.department);
      const recv = s.receivedBy ? `<span style="font-size:0.72rem;color:#6a6b62"> · Rcvd: ${s.receivedBy}</span>` : '';
      const items = (s.items||[]).map(i=>`${i.qty}× ${i.name}`).join(', ');
      html += `<div style="padding:7px 0;border-bottom:1px solid #e4e4df;font-size:0.83rem">
        <div style="display:flex;justify-content:space-between">
          <span>${who}${recv}</span>
          <span class="text-gold fw4">${fmtNaira(s.amount)}</span>
        </div>
        <div style="font-size:0.72rem;color:#6a6b62;margin-top:2px">${items}${time ? ' · '+time : ''} · ${(s.paymentMethod||'').toUpperCase()}</div>
      </div>`;
    });
    if (seeAll) html += `<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:0.82rem;color:#6a6b62"><span>Subtotal</span><span>${fmtNaira(grandPOS)}</span></div>`;
  }

  if (seeAll && (manualDocs.length || posDocs.length)) {
    html += `<div style="display:flex;justify-content:space-between;padding:9px 0;font-weight:400;font-size:0.88rem;border-top:1px solid #C9A96E;margin-top:4px"><span>Grand Total</span><span class="text-gold">${fmtNaira(grandManual + grandPOS)}</span></div>`;
  }

  el.innerHTML = html;
}

async function loadHistory() {
  const snap = await db.collection('sales').where('staffId','==',staff.id).orderBy('submittedAt','desc').limit(15).get();
  const tbody = document.getElementById('historyTable');
  tbody.innerHTML = snap.empty
    ? '<tr><td colspan="3" style="text-align:center;padding:16px;color:#6a6b62">No history yet.</td></tr>'
    : snap.docs.map(d => { const s=d.data(); return `<tr><td>${s.date}</td><td>${s.department}</td><td class="text-gold fw4">${fmtNaira(s.totalSales)}</td></tr>`; }).join('');
}

buildDeptOptions(); loadToday(); loadHistory();
</script>
</body>
</html>
