<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Home · Eden 54 Portal</title>
<link rel="icon" type="image/jpeg" href="/logo/eden 54 logo.jpeg">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/portal/portal.css">
<style>
/* ── Clock card ── */
.clock-card{background:var(--deep);border-radius:12px;padding:26px 28px;display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:24px;flex-wrap:wrap;}
.clock-info .greeting{font-size:0.68rem;letter-spacing:0.22em;text-transform:uppercase;color:rgba(245,242,236,0.3);margin-bottom:5px;}
.clock-info .cname{font-size:1.35rem;font-weight:400;color:#f5f2ec;margin-bottom:4px;}
.clock-info .cdept{font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);opacity:0.7;}
.clock-info .cstatus{font-size:0.82rem;color:var(--gold);margin-top:10px;}
.clock-info .ctime{font-size:0.74rem;color:rgba(245,242,236,0.35);margin-top:3px;}
.clock-right{display:flex;flex-direction:column;align-items:center;gap:10px;}
.clock-timer{font-size:2rem;font-weight:200;color:var(--gold);letter-spacing:0.08em;font-variant-numeric:tabular-nums;min-width:110px;text-align:center;}
.btn-cin{background:#15803d;color:#fff;padding:13px 30px;font-size:0.8rem;letter-spacing:0.14em;border-radius:4px;}
.btn-cout{background:#b91c1c;color:#fff;padding:13px 30px;font-size:0.8rem;letter-spacing:0.14em;border-radius:4px;}
.btn-cin:hover{background:#166534;}
.btn-cout:hover{background:#991b1b;}

/* ── Report form ── */
.report-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:24px;}
.report-card h2{font-size:0.85rem;font-weight:400;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);margin-bottom:18px;}
.report-card textarea{width:100%;min-height:100px;resize:vertical;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:6px;padding:12px 14px;color:var(--text);font-family:'Jost',sans-serif;font-size:0.88rem;font-weight:300;line-height:1.6;}
.report-card textarea:focus{outline:none;border-color:var(--gold);}
.report-card textarea::placeholder{color:var(--muted);}

/* photo picker */
.photo-row{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0;}
.photo-thumb{position:relative;width:72px;height:72px;}
.photo-thumb img{width:100%;height:100%;border-radius:7px;object-fit:cover;border:1px solid var(--border);}
.photo-thumb .del{position:absolute;top:-5px;right:-5px;background:#dc2626;color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
.add-photo{width:72px;height:72px;border:2px dashed var(--border);border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.5rem;color:var(--muted);transition:border-color 0.2s,color 0.2s;}
.add-photo:hover{border-color:var(--gold);color:var(--gold);}
.upload-bar{height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;display:none;}
.upload-bar .fill{height:100%;background:var(--gold);transition:width 0.2s;width:0%;}
.report-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:14px;}

</style>
</head>
<body>
<div class="sb-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="sb-brand"><div class="sb-brand-name">Eden 54</div><div class="sb-brand-sub">Staff Portal</div></div>
  <nav class="sb-nav" id="sbNav"></nav>
  <div class="sb-foot">
    <div id="sidebarUser"></div>
    <a class="sb-item" onclick="switchProfile()" style="cursor:pointer"><i class="sb-icon">🔄</i> Switch Profile</a>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="hamburger" onclick="toggleSidebar()"><div></div><div></div><div></div></button>
      <h1>My Home</h1>
    </div>
    <div class="topbar-date" id="topDate"></div>
  </div>

  <div class="content">
    <div id="alertBox" class="alert"></div>

    <!-- ── 1. CLOCK IN / OUT ── -->
    <div class="clock-card">
      <div class="clock-info">
        <div class="greeting">Welcome back</div>
        <div class="cname" id="clockName">—</div>
        <div class="cdept" id="clockDept"></div>
        <div class="cstatus" id="clockStatus">Checking…</div>
        <div class="ctime" id="clockTime"></div>
      </div>
      <div class="clock-right">
        <div class="clock-timer" id="clockTimer"></div>
        <button class="btn btn-cin" id="cinBtn" onclick="clockIn()" style="display:none">Clock In</button>
        <button class="btn btn-cout" id="coutBtn" onclick="clockOut()" style="display:none">Clock Out</button>
        <div id="geoStatus" style="font-size:0.7rem;letter-spacing:0.08em;text-align:center;margin-top:4px"></div>
      </div>
    </div>

    <!-- ── 2. DAILY REPORT + PHOTO ── -->
    <div class="report-card">
      <h2>Post Report / Update</h2>
      <textarea id="reportText" placeholder="Write your report or update here… e.g. tasks done, issues encountered, handover notes"></textarea>

      <!-- Photo strip -->
      <div class="photo-row" id="photoRow">
        <div class="add-photo" id="addPhotoBtn" onclick="document.getElementById('photoInput').click()" title="Add photo">+</div>
      </div>
      <input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="onPhotosChosen(this)">
      <div class="upload-bar" id="uploadBar"><div class="fill" id="uploadFill"></div></div>

      <div class="report-actions">
        <button class="btn btn-gold" id="submitBtn" onclick="submitReport()">Submit Report</button>
        <span id="reportNote" style="font-size:0.75rem;color:var(--muted)">Photos are optional</span>
      </div>
    </div>

    <!-- ── 3. TODAY'S STATS ── -->
    <div class="g2" style="margin-bottom:24px">
      <div class="card">
        <div class="card-label">My Reports Today</div>
        <div class="card-value" id="myReports">—</div>
        <div class="card-sub">Updates submitted</div>
      </div>
      <div class="card">
        <div class="card-label">Hours Worked</div>
        <div class="card-value" id="hoursWorked">—</div>
        <div class="card-sub">Today's session</div>
      </div>
    </div>

  </div>
</div>


<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="/portal/firebase-init.js"></script>
<script>
/* ═══════════════════════════════
   INIT
═══════════════════════════════ */
const staff = getStaff();
populateSidebar(staff);
buildNav(staff, 'home');
document.getElementById('clockName').textContent = staff.name;
document.getElementById('clockDept').textContent = staff.department;
document.getElementById('topDate').textContent =
  new Date().toLocaleDateString('en-NG',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

const today      = todayStr();
const clockDocId = today + '_' + staff.id;
let clockInTime = null, timerInt = null;

/* ═══════════════════════════════
   CLOCK IN / OUT  (multi-session per day)
   One Firestore doc per staff per day.
   Doc stores a 'sessions' array:
     [{clockIn, clockOut, clockInLocation, clockOutLocation}, …]
   The last entry without clockOut = active session.
   No composite index needed.
═══════════════════════════════ */
async function loadClockStatus() {
  try {
    const snap = await db.collection('clockings').doc(clockDocId).get();
    if (!snap.exists) {
      setClockUI('out');
    } else {
      const d = snap.data();
      const sessions = d.sessions || [];
      const last = sessions[sessions.length - 1];
      if (!last) { setClockUI('out'); return; }
      clockInTime = last.clockIn ? last.clockIn.toDate() : null;
      if (last.clockOut) {
        const dur   = calcDur(last.clockIn.toDate(), last.clockOut.toDate());
        const total = calcTotal(sessions);
        setClockUI('done', { inTime: last.clockIn.toDate(), outTime: last.clockOut.toDate(), dur, total });
        document.getElementById('hoursWorked').textContent = total;
      } else {
        setClockUI('in', { inTime: clockInTime });
        startTimer(clockInTime);
      }
    }
  } catch(e) {
    document.getElementById('clockStatus').textContent = 'Could not load clock status';
    console.error(e);
  }
}

function calcTotal(sessions) {
  let ms = 0;
  (sessions || []).forEach(s => {
    if (s.clockIn && s.clockOut) ms += s.clockOut.toDate() - s.clockIn.toDate();
  });
  const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000);
  return h + 'h ' + pad(m) + 'm';
}

function setClockUI(state, data = {}) {
  const cinBtn  = document.getElementById('cinBtn');
  const coutBtn = document.getElementById('coutBtn');
  const status  = document.getElementById('clockStatus');
  const ctime   = document.getElementById('clockTime');
  cinBtn.style.display = 'none'; coutBtn.style.display = 'none';
  if (state === 'out') {
    status.textContent = 'Not clocked in yet today';
    ctime.textContent  = '';
    cinBtn.style.display = 'inline-flex';
    cinBtn.textContent  = 'Clock In';
  } else if (state === 'in') {
    status.textContent = 'Clocked in';
    ctime.textContent  = 'Since ' + fmtTime(data.inTime);
    coutBtn.style.display = 'inline-flex';
    coutBtn.textContent   = 'Clock Out';
  } else {
    status.textContent = 'Last out: ' + data.dur + ' · Total today: ' + (data.total || data.dur);
    ctime.textContent  = 'In: ' + fmtTime(data.inTime) + ' · Out: ' + fmtTime(data.outTime);
    cinBtn.style.display = 'inline-flex';
    cinBtn.textContent  = 'Clock In Again';
  }
}

async function resolveGeo() {
  const geoEl = document.getElementById('geoStatus');
  geoEl.style.color = 'rgba(245,242,236,0.4)';
  geoEl.textContent = 'Getting location…';
  const loc = await captureLocation();
  if (!loc) {
    geoEl.style.color = '#fca5a5';
    geoEl.textContent = 'Location unavailable';
    return { loc: null, atFacility: false, distanceMeters: null };
  }
  const dist      = Math.round(haversineDistance(FACILITY.lat, FACILITY.lng, loc.lat, loc.lng));
  const atFacility = dist <= CLOCK_RADIUS_METERS;
  if (atFacility) {
    geoEl.style.color = '#4ade80';
    geoEl.textContent = 'At facility · ' + dist + 'm';
  } else {
    geoEl.style.color = '#fbbf24';
    geoEl.textContent = 'Remote · ' + dist + 'm away';
  }
  return { loc, atFacility, distanceMeters: dist };
}

async function clockIn() {
  const btn = document.getElementById('cinBtn');
  btn.disabled = true; btn.textContent = 'Getting location…';
  const { loc, atFacility, distanceMeters } = await resolveGeo();
  btn.textContent = 'Clocking in…';
  try {
    const now     = firebase.firestore.Timestamp.now();
    const newSess = {
      clockIn: now, clockOut: null,
      clockInLocation: loc ? { lat: loc.lat, lng: loc.lng, accuracy: loc.accuracy, distanceMeters, atFacility } : null
    };
    const docRef = db.collection('clockings').doc(clockDocId);
    const snap   = await docRef.get();
    if (snap.exists) {
      await docRef.update({ sessions: firebase.firestore.FieldValue.arrayUnion(newSess) });
    } else {
      await docRef.set({
        date: today, staffId: staff.id, staffName: staff.name, department: staff.department,
        sessions: [newSess]
      });
    }
    clockInTime = now.toDate();
    clearInterval(timerInt);
    document.getElementById('clockTimer').textContent = '';
    setClockUI('in', { inTime: clockInTime });
    startTimer(clockInTime);
    const locNote = loc ? (atFacility ? ' · At facility' : ' · Remote (' + distanceMeters + 'm away)') : ' · Location not captured';
    showAlert('alertBox', 'Clocked in at ' + fmtTime(clockInTime) + locNote, atFacility ? 'alert-success' : 'alert-warn');
  } catch(e) {
    showAlert('alertBox', 'Clock in failed. Check your connection.', 'alert-error');
    btn.disabled = false; btn.textContent = 'Clock In';
  }
}

async function clockOut() {
  const btn = document.getElementById('coutBtn');
  btn.disabled = true; btn.textContent = 'Getting location…';
  const { loc, atFacility, distanceMeters } = await resolveGeo();
  btn.textContent = 'Clocking out…';
  try {
    const now    = firebase.firestore.Timestamp.now();
    const docRef = db.collection('clockings').doc(clockDocId);
    const snap   = await docRef.get();
    const sessions = snap.data().sessions || [];
    // Update the last session that has no clockOut
    const idx = sessions.map(s => !s.clockOut).lastIndexOf(true);
    if (idx === -1) { showAlert('alertBox', 'No active session to clock out of.', 'alert-error'); btn.disabled = false; btn.textContent = 'Clock Out'; return; }
    sessions[idx] = {
      ...sessions[idx],
      clockOut: now,
      clockOutLocation: loc ? { lat: loc.lat, lng: loc.lng, accuracy: loc.accuracy, distanceMeters, atFacility } : null
    };
    await docRef.update({ sessions });
    clearInterval(timerInt);
    document.getElementById('clockTimer').textContent = '';
    const dur   = calcDur(clockInTime, now.toDate());
    const total = calcTotal(sessions);
    setClockUI('done', { inTime: clockInTime, outTime: now.toDate(), dur, total });
    document.getElementById('hoursWorked').textContent = total;
    const locNote = loc ? (atFacility ? ' · At facility' : ' · Remote (' + distanceMeters + 'm away)') : '';
    showAlert('alertBox', 'Clocked out. ' + dur + ' this session · ' + total + ' total today.' + locNote, atFacility ? 'alert-success' : 'alert-warn');
    autoMarkAttendance(today, total);
  } catch(e) {
    showAlert('alertBox', 'Clock out failed. Check your connection.', 'alert-error');
    btn.disabled = false; btn.textContent = 'Clock Out';
  }
}

async function autoMarkAttendance(date, hoursWorked) {
  try {
    const attRef  = db.collection('attendance').doc(date);
    const snap    = await attRef.get();
    const record  = {
      staffId: staff.id, staffName: staff.name, department: staff.department,
      status: 'Present', autoMarked: true, hoursWorked
    };
    if (snap.exists) {
      const records = snap.data().records || [];
      const idx = records.findIndex(r => r.staffId === staff.id);
      if (idx >= 0) {
        // Don't override a manual 'Leave' decision, but update everything else
        if (records[idx].status !== 'Leave') records[idx] = { ...records[idx], ...record };
      } else {
        records.push(record);
      }
      await attRef.update({ records });
    } else {
      await attRef.set({ date, records: [record], markedBy: 'Auto', markedAt: firebase.firestore.FieldValue.serverTimestamp() });
    }
  } catch(e) {
    // Silent — attendance auto-mark is best-effort; don't interrupt the clock-out flow
  }
}

function startTimer(since) {
  function tick() {
    const diff = Date.now() - since.getTime();
    const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
    document.getElementById('clockTimer').textContent = pad(h)+':'+pad(m)+':'+pad(s);
    document.getElementById('hoursWorked').textContent = pad(h)+'h '+pad(m)+'m';
  }
  tick(); timerInt = setInterval(tick, 1000);
}

function fmtTime(d){ return d.toLocaleTimeString('en-NG',{hour:'2-digit',minute:'2-digit'}); }
function pad(n){ return String(n).padStart(2,'0'); }
function calcDur(start,end){ const d=end-start; return Math.floor(d/3600000)+'h '+pad(Math.floor((d%3600000)/60000))+'m'; }

/* ═══════════════════════════════
   PHOTO UPLOAD HELPERS
═══════════════════════════════ */
let pendingFiles = []; // File objects chosen but not yet uploaded

function onPhotosChosen(input) {
  const files = Array.from(input.files);
  const remaining = 6 - pendingFiles.length;
  if (!remaining) { showAlert('alertBox','Maximum 6 photos allowed.','alert-error'); return; }
  files.slice(0, remaining).forEach(f => {
    if (f.size > 8 * 1024 * 1024) { showAlert('alertBox', f.name + ' is too large (max 8 MB).', 'alert-error'); return; }
    pendingFiles.push(f);
    addPhotoThumb(f);
  });
  input.value = '';
  document.getElementById('addPhotoBtn').style.display = pendingFiles.length >= 6 ? 'none' : 'flex';
}

function addPhotoThumb(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const idx = pendingFiles.indexOf(file);
    const wrap = document.createElement('div');
    wrap.className = 'photo-thumb';
    wrap.dataset.idx = idx;
    wrap.innerHTML = `<img src="${e.target.result}" alt="preview"><button class="del" onclick="removePhoto(${idx})" title="Remove">×</button>`;
    document.getElementById('photoRow').insertBefore(wrap, document.getElementById('addPhotoBtn'));
  };
  reader.readAsDataURL(file);
}

function removePhoto(idx) {
  pendingFiles[idx] = null; // mark as removed
  document.querySelector(`.photo-thumb[data-idx="${idx}"]`).remove();
  document.getElementById('addPhotoBtn').style.display = 'flex';
}

/* ═══════════════════════════════
   SUBMIT REPORT
═══════════════════════════════ */
async function submitReport() {
  const text    = document.getElementById('reportText').value.trim();
  const files   = pendingFiles.filter(Boolean);
  if (!text && !files.length) {
    showAlert('alertBox','Write a report or attach at least one photo.','alert-error'); return;
  }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Submitting…';
  const bar  = document.getElementById('uploadBar');
  const fill = document.getElementById('uploadFill');
  bar.style.display = 'block'; fill.style.width = '0%';

  try {
    // 1. Upload photos to Storage
    const photoURLs = [];
    for (let i = 0; i < files.length; i++) {
      const f    = files[i];
      const path = `updates/${staff.id}/${Date.now()}_${i}`;
      const ref  = storage.ref(path);
      await ref.put(f);
      const url  = await ref.getDownloadURL();
      photoURLs.push(url);
      fill.style.width = ((i + 1) / files.length * 80) + '%';
    }

    // 2. Save to Firestore updates collection
    await db.collection('updates').add({
      staffId:     staff.id,
      staffName:   staff.name,
      department:  staff.department,
      text:        text,
      photos:      photoURLs,
      createdAt:   firebase.firestore.FieldValue.serverTimestamp()
    });

    fill.style.width = '100%';
    setTimeout(() => { bar.style.display = 'none'; fill.style.width = '0%'; }, 600);

    // 3. Reset form
    document.getElementById('reportText').value = '';
    pendingFiles = [];
    document.querySelectorAll('.photo-thumb').forEach(el => el.remove());
    document.getElementById('addPhotoBtn').style.display = 'flex';

    showAlert('alertBox','Report submitted successfully!','alert-success');
    loadMyReports();
  } catch(e) {
    console.error(e);
    showAlert('alertBox','Submission failed: ' + e.message,'alert-error');
  } finally {
    btn.disabled = false; btn.textContent = 'Submit Report';
  }
}

/* ═══════════════════════════════
   STATS
═══════════════════════════════ */
async function loadMyReports() {
  try {
    // Count today's updates from this staff member
    const snap = await db.collection('updates')
      .where('staffId','==',staff.id)
      .get();
    // Filter today client-side (avoid composite index requirement)
    const todayUpdates = snap.docs.filter(doc => {
      const ts = doc.data().createdAt;
      if (!ts) return false;
      const dt = ts.toDate();
      const ds = dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
      return ds === today;
    });
    document.getElementById('myReports').textContent = todayUpdates.length;
  } catch(e) {
    document.getElementById('myReports').textContent = '—';
  }
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function openLB(src){ document.getElementById('lbImg').src = src; document.getElementById('lb').classList.add('open'); }
function closeLB(e){ if(e.target===document.getElementById('lb')) document.getElementById('lb').classList.remove('open'); }

/* ── Run ── */
loadClockStatus();
loadMyReports();
</script>
</body>
</html>
