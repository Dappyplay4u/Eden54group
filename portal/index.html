<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eden 54 · Staff Portal</title>
<link rel="icon" type="image/jpeg" href="/logo/eden 54 logo.jpeg">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Jost',sans-serif;font-weight:300;background:#0f2318;min-height:100vh;padding:40px 20px;}
.wrap{max-width:860px;margin:0 auto;}
.header{text-align:center;margin-bottom:40px;}
.header img{width:64px;height:64px;border-radius:50%;object-fit:cover;margin-bottom:14px;}
.header h1{font-size:1.6rem;color:#C9A96E;letter-spacing:0.1em;font-weight:400;}
.header p{font-size:0.72rem;letter-spacing:0.22em;text-transform:uppercase;color:rgba(245,242,236,0.35);margin-top:5px;}
.header .sub{font-size:0.9rem;color:rgba(245,242,236,0.55);margin-top:14px;font-weight:300;}
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:36px;}
.staff-card{background:rgba(255,255,255,0.05);border:1px solid rgba(201,169,110,0.15);border-radius:10px;padding:22px 16px;text-align:center;cursor:pointer;transition:background 0.2s,border-color 0.2s,transform 0.15s;}
.staff-card:hover{background:rgba(201,169,110,0.1);border-color:rgba(201,169,110,0.5);transform:translateY(-2px);}
.avatar{width:52px;height:52px;border-radius:50%;background:#C9A96E;color:#0f2318;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:500;margin:0 auto 12px;letter-spacing:0.05em;}
.staff-name{font-size:0.88rem;color:rgba(245,242,236,0.9);font-weight:400;margin-bottom:4px;}
.staff-dept{font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(245,242,236,0.3);}
.section-label{font-size:0.6rem;letter-spacing:0.25em;text-transform:uppercase;color:rgba(201,169,110,0.5);margin-bottom:12px;}
.divider{height:1px;background:rgba(201,169,110,0.1);margin:28px 0;}
.manage-link{text-align:center;}
.manage-link a{font-size:0.75rem;color:rgba(245,242,236,0.3);letter-spacing:0.1em;text-decoration:none;border-bottom:1px solid rgba(245,242,236,0.12);padding-bottom:2px;transition:color 0.2s;}
.manage-link a:hover{color:rgba(201,169,110,0.7);}
.loading{text-align:center;color:rgba(245,242,236,0.3);font-size:0.85rem;padding:40px;}
@media(max-width:480px){.staff-grid{grid-template-columns:repeat(2,1fr);}.header h1{font-size:1.3rem;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <img src="/logo/eden 54 logo.jpeg" alt="Eden 54">
    <h1>Eden 54</h1>
    <p>Staff Portal</p>
    <div class="sub">Select your profile to continue</div>
  </div>

  <div id="salonSection" style="display:none">
    <div class="section-label">Barbing Salon</div>
    <div class="staff-grid" id="salonGrid"></div>
  </div>
  <div class="divider" id="div1" style="display:none"></div>
  <div id="otherSection" style="display:none">
    <div class="section-label">Apartment &amp; Lounge</div>
    <div class="staff-grid" id="otherGrid"></div>
  </div>

  <div id="loadingEl" class="loading">Loading staff…</div>

  <div id="errorBox" style="display:none;background:rgba(220,38,38,0.12);border:1px solid rgba(220,38,38,0.3);border-radius:8px;padding:18px 20px;margin-bottom:20px;text-align:center">
    <div style="color:#fca5a5;font-size:0.88rem;margin-bottom:12px">Unable to connect to database.</div>
    <div style="color:rgba(245,242,236,0.45);font-size:0.78rem;margin-bottom:14px">Firestore rules may be blocking access. Go to Firebase Console → Firestore → Rules and set them to allow all reads/writes.</div>
    <button onclick="window.location.reload()" style="padding:8px 20px;background:rgba(201,169,110,0.2);border:1px solid rgba(201,169,110,0.4);color:#C9A96E;border-radius:4px;cursor:pointer;font-family:'Jost',sans-serif;font-size:0.78rem">Retry</button>
  </div>

  <div class="divider"></div>
  <div style="text-align:center">
    <p style="font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(245,242,236,0.2);margin-bottom:14px">Manager Access</p>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <a href="/portal/staff/" style="display:inline-block;padding:10px 24px;border:1px solid rgba(201,169,110,0.35);border-radius:4px;font-family:'Jost',sans-serif;font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:#C9A96E;text-decoration:none;transition:background 0.2s" onmouseover="this.style.background='rgba(201,169,110,0.1)'" onmouseout="this.style.background='transparent'">Manage Staff</a>
      <a href="/portal/dashboard/" style="display:inline-block;padding:10px 24px;border:1px solid rgba(201,169,110,0.35);border-radius:4px;font-family:'Jost',sans-serif;font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:#C9A96E;text-decoration:none;transition:background 0.2s" onmouseover="this.style.background='rgba(201,169,110,0.1)'" onmouseout="this.style.background='transparent'">Dashboard</a>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="/portal/firebase-init.js"></script>
<script>
// If already selected, redirect
const saved = localStorage.getItem('eden54_staff');
if (saved) {
  try {
    const s = JSON.parse(saved);
    window.location.href = s.role === 'manager' ? '/portal/dashboard/' : '/portal/home/';
  } catch(e) {}
}

async function loadStaff() {
  try {
    const snap = await db.collection('staff').orderBy('name').get();
    document.getElementById('loadingEl').style.display = 'none';

    if (snap.empty) {
      document.getElementById('loadingEl').style.display = 'block';
      document.getElementById('loadingEl').textContent = 'No staff added yet. Go to Manage Staff to add team members.';
      return;
    }

    const salon = [], others = [];
    snap.forEach(d => {
      const s = { id: d.id, ...d.data() };
      if (s.department === 'salon') salon.push(s); else others.push(s);
    });

    if (salon.length) {
      document.getElementById('salonSection').style.display = 'block';
      document.getElementById('salonGrid').innerHTML = salon.map(s => cardHTML(s)).join('');
    }
    if (others.length) {
      document.getElementById('otherSection').style.display = 'block';
      if (salon.length) document.getElementById('div1').style.display = 'block';
      document.getElementById('otherGrid').innerHTML = others.map(s => cardHTML(s)).join('');
    }
  } catch(e) {
    document.getElementById('loadingEl').style.display = 'none';
    document.getElementById('errorBox').style.display = 'block';
  }
}

function cardHTML(s) {
  const safeData = encodeURIComponent(JSON.stringify({ id: s.id, name: s.name, department: s.department, role: s.role || 'staff' }));
  const avatarHTML = s.photoURL
    ? `<div class="avatar" style="background:transparent;padding:0;overflow:hidden"><img src="${s.photoURL}" alt="${s.name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"></div>`
    : `<div class="avatar">${avatarInitials(s.name)}</div>`;
  return `<div class="staff-card" onclick="selectStaff('${safeData}')">
    ${avatarHTML}
    <div class="staff-name">${s.name}</div>
    <div class="staff-dept">${s.department}</div>
  </div>`;
}

function selectStaff(encodedData) {
  const data = JSON.parse(decodeURIComponent(encodedData));
  setStaff(data);
  window.location.href = data.role === 'manager' ? '/portal/dashboard/' : '/portal/home/';
}

loadStaff();
</script>
</body>
</html>
