<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eden 54 · Staff Portal</title>
<link rel="icon" type="image/jpeg" href="/logo/eden 54 logo.jpeg">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Jost',sans-serif;font-weight:300;background:#0f2318;min-height:100vh;padding:40px 20px;}
.wrap{max-width:860px;margin:0 auto;}
.header{text-align:center;margin-bottom:40px;}
.header img{width:64px;height:64px;border-radius:50%;object-fit:cover;margin-bottom:14px;}
.header h1{font-size:1.6rem;color:#C9A96E;letter-spacing:0.1em;font-weight:400;}
.header p{font-size:0.72rem;letter-spacing:0.22em;text-transform:uppercase;color:rgba(245,242,236,0.35);margin-top:5px;}
.header .sub{font-size:0.9rem;color:rgba(245,242,236,0.55);margin-top:14px;font-weight:300;}

.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px;margin-bottom:28px;}
.staff-card{background:rgba(255,255,255,0.05);border:1px solid rgba(201,169,110,0.15);border-radius:10px;padding:22px 16px;text-align:center;cursor:pointer;transition:background 0.2s,border-color 0.2s,transform 0.15s;}
.staff-card:hover{background:rgba(201,169,110,0.1);border-color:rgba(201,169,110,0.5);transform:translateY(-2px);}
.staff-card.mgr{border-color:rgba(201,169,110,0.4);background:rgba(201,169,110,0.05);}
.avatar{width:56px;height:56px;border-radius:50%;background:#C9A96E;color:#0f2318;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:500;margin:0 auto 12px;letter-spacing:0.05em;overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.staff-name{font-size:0.88rem;color:rgba(245,242,236,0.9);font-weight:400;margin-bottom:4px;}
.staff-dept{font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(245,242,236,0.3);}
.section-label{font-size:0.6rem;letter-spacing:0.25em;text-transform:uppercase;color:rgba(201,169,110,0.45);margin-bottom:12px;}
.divider{height:1px;background:rgba(201,169,110,0.1);margin:24px 0;}
.loading{text-align:center;color:rgba(245,242,236,0.3);font-size:0.85rem;padding:40px;}

/* Manager bar — always visible */
.mgr-bar{border-top:1px solid rgba(201,169,110,0.12);padding-top:24px;margin-top:8px;text-align:center;}
.mgr-bar-label{font-size:0.6rem;letter-spacing:0.25em;text-transform:uppercase;color:rgba(201,169,110,0.35);margin-bottom:14px;}
.mgr-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.mgr-btn{padding:10px 24px;border:1px solid rgba(201,169,110,0.3);border-radius:4px;font-family:'Jost',sans-serif;font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(201,169,110,0.65);text-decoration:none;transition:all 0.2s;background:transparent;}
.mgr-btn:hover{border-color:rgba(201,169,110,0.7);color:#C9A96E;background:rgba(201,169,110,0.08);}

@media(max-width:480px){.staff-grid{grid-template-columns:repeat(2,1fr);}.header h1{font-size:1.3rem;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <img src="/logo/eden 54 logo.jpeg" alt="Eden 54">
    <h1>Eden 54</h1>
    <p>Staff Portal</p>
    <div class="sub">Select your profile to continue</div>
  </div>

  <!-- Staff sections -->
  <div id="salonSection" style="display:none">
    <div class="section-label">Barbing Salon</div>
    <div class="staff-grid" id="salonGrid"></div>
  </div>
  <div class="divider" id="div1" style="display:none"></div>
  <div id="otherSection" style="display:none">
    <div class="section-label">Apartment &amp; Lounge</div>
    <div class="staff-grid" id="otherGrid"></div>
  </div>
  <div class="divider" id="div2" style="display:none"></div>
  <div id="managerSection" style="display:none">
    <div class="section-label">Management</div>
    <div class="staff-grid" id="managerGrid"></div>
  </div>

  <div id="loadingEl" class="loading">Loading staff…</div>
  <div id="emptyEl" style="display:none;text-align:center;color:rgba(245,242,236,0.3);font-size:0.85rem;padding:24px 0">
    No staff added yet — use "Manage Staff" below to add your team.
  </div>
  <div id="errorBox" style="display:none;background:rgba(220,38,38,0.1);border:1px solid rgba(220,38,38,0.2);border-radius:8px;padding:16px 18px;text-align:center;margin-bottom:8px">
    <div style="color:#fca5a5;font-size:0.83rem;margin-bottom:8px">Unable to connect. Firestore rules may not be published yet.</div>
    <button onclick="window.location.reload()" style="padding:7px 18px;background:rgba(201,169,110,0.15);border:1px solid rgba(201,169,110,0.3);color:#C9A96E;border-radius:4px;cursor:pointer;font-family:'Jost',sans-serif;font-size:0.75rem">Retry</button>
  </div>

  <!-- Quick access links -->
  <div class="mgr-bar">
    <div class="mgr-bar-label">Quick Access</div>
    <div class="mgr-btns">
      <a href="/portal/pos/" class="mgr-btn">🖥️ POS Terminal</a>
      <a href="/portal/staff/" class="mgr-btn">Manage Staff</a>
      <a href="/portal/dashboard/" class="mgr-btn">Dashboard</a>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="/portal/firebase-init.js"></script>
<script>
// ?switch in the URL always forces the picker to show — clears current session
if (new URLSearchParams(window.location.search).has('switch')) {
  localStorage.removeItem('eden54_staff');
  history.replaceState(null, '', '/portal/');
}

// If staff already selected, redirect straight to their page
const saved = localStorage.getItem('eden54_staff');
if (saved) {
  try {
    const s = JSON.parse(saved);
    const lvl2 = (s.accessLevel || s.role || '').toLowerCase().replace(/\s+/g,'');
    window.location.href = ['ceo','superadmin','manager'].includes(lvl2) || lvl2.includes('manager') ? '/portal/dashboard/' : '/portal/home/';
  } catch(e) { localStorage.removeItem('eden54_staff'); }
}

async function loadStaff() {
  try {
    // Simple query — no inequality filter to avoid index issues
    const snap = await db.collection('staff').orderBy('name').get();
    document.getElementById('loadingEl').style.display = 'none';

    if (snap.empty) {
      document.getElementById('emptyEl').style.display = 'block';
      return;
    }

    const salon = [], others = [], managers = [];
    snap.forEach(d => {
      const s = { id: d.id, ...d.data() };
      if (s.active === false) return;
      const lvl = (s.accessLevel || s.role || '').toLowerCase().replace(/\s+/g,'');
      if (['ceo','superadmin','manager','hr'].includes(lvl)) managers.push(s);
      else if (s.department === 'salon') salon.push(s);
      else others.push(s);
    });

    if (salon.length) {
      document.getElementById('salonSection').style.display = 'block';
      document.getElementById('salonGrid').innerHTML = salon.map(s => cardHTML(s)).join('');
    }
    if (others.length) {
      if (salon.length) document.getElementById('div1').style.display = 'block';
      document.getElementById('otherSection').style.display = 'block';
      document.getElementById('otherGrid').innerHTML = others.map(s => cardHTML(s)).join('');
    }
    if (managers.length) {
      if (salon.length || others.length) document.getElementById('div2').style.display = 'block';
      document.getElementById('managerSection').style.display = 'block';
      document.getElementById('managerGrid').innerHTML = managers.map(s => cardHTML(s, true)).join('');
    }

    if (!salon.length && !others.length && !managers.length) {
      document.getElementById('emptyEl').style.display = 'block';
    }

  } catch(e) {
    document.getElementById('loadingEl').style.display = 'none';
    document.getElementById('errorBox').style.display = 'block';
    console.error(e);
  }
}

function cardHTML(s, isManager = false) {
  const data = encodeURIComponent(JSON.stringify({
    id: s.id, name: s.name, department: s.department,
    role: s.role || 'staff', accessLevel: s.accessLevel || ''
  }));
  const avatarHTML = s.photoURL
    ? `<div class="avatar"><img src="${s.photoURL}" alt="${s.name}"></div>`
    : `<div class="avatar">${avatarInitials(s.name)}</div>`;
  return `<div class="staff-card${isManager ? ' mgr' : ''}" onclick="selectStaff('${data}')">
    ${avatarHTML}
    <div class="staff-name">${s.name}</div>
    <div class="staff-dept" style="${isManager ? 'color:rgba(201,169,110,0.5)' : ''}">${isManager ? 'Manager' : s.department}</div>
  </div>`;
}

function selectStaff(encoded) {
  const data = JSON.parse(decodeURIComponent(encoded));
  setStaff(data);
  const lvl = (data.accessLevel || data.role || '').toLowerCase().replace(/\s+/g,'');
  const isPriv = ['ceo', 'superadmin', 'manager'].includes(lvl);
  window.location.href = isPriv ? '/portal/dashboard/' : '/portal/home/';
}

loadStaff();
</script>
</body>
</html>
