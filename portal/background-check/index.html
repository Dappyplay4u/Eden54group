<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f2318">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Eden 54">
<title>Background Checks · Eden 54 Portal</title>
<link rel="icon" type="image/jpeg" href="/logo/eden 54 logo.jpeg">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/portal/portal.css">
<style>
.bc-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.bc-tab{padding:6px 16px;border:1px solid var(--border);background:none;color:var(--muted);font-family:'Jost',sans-serif;font-size:.72rem;letter-spacing:.1em;border-radius:4px;cursor:pointer;transition:.2s}
.bc-tab.active{border-color:var(--gold);color:var(--gold);background:rgba(201,169,110,.08)}
.bc-card{background:var(--deep);border:1px solid var(--border);border-radius:6px;padding:16px 20px;margin-bottom:12px;cursor:pointer;transition:border-color .2s}
.bc-card:hover{border-color:rgba(201,169,110,.5)}
.bc-card-top{display:flex;align-items:flex-start;gap:14px}
.bc-initials{width:40px;height:40px;border-radius:50%;background:var(--gold);color:#0f2318;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:500;flex-shrink:0}
.bc-card-info{flex:1;min-width:0}
.bc-name{font-size:.95rem;font-weight:400;color:var(--text)}
.bc-meta{font-size:.72rem;color:var(--muted);margin-top:3px;line-height:1.6}
.bc-status{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;padding:3px 10px;border-radius:3px;border:1px solid;flex-shrink:0}
.st-pending{color:#C9A96E;border-color:rgba(201,169,110,.4);background:rgba(201,169,110,.08)}
.st-review{color:#7ec8e3;border-color:rgba(126,200,227,.4);background:rgba(126,200,227,.08)}
.st-approved{color:#5a9e6f;border-color:rgba(90,158,111,.4);background:rgba(90,158,111,.08)}
.st-rejected{color:#e07070;border-color:rgba(224,112,112,.4);background:rgba(224,112,112,.08)}
.bc-docs{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.doc-link{font-size:.65rem;padding:3px 10px;border:1px solid var(--border);border-radius:3px;color:var(--gold);text-decoration:none;transition:.2s}
.doc-link:hover{background:rgba(201,169,110,.1);border-color:rgba(201,169,110,.5)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:8000;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:#0f2318;border:1px solid var(--border);border-radius:8px;width:100%;max-width:760px;overflow:hidden;color:#F5F2EC}
.modal-hdr{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-hdr h3{font-size:1rem;font-weight:400;color:#F5F2EC}
.modal-close{background:none;border:none;font-size:1.2rem;color:var(--muted);cursor:pointer;padding:4px 8px}
.modal-close:hover{color:var(--gold)}
.modal-body{padding:24px;max-height:75vh;overflow-y:auto}
.m-sec{margin-bottom:24px}
.m-sec-title{font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.m-row{display:flex;gap:10px;margin-bottom:7px;font-size:.8rem;line-height:1.5}
.m-k{color:rgba(245,242,236,0.55);min-width:160px;flex-shrink:0}
.m-v{color:#F5F2EC;word-break:break-word}
.m-doc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px}
.m-doc-btn{display:block;padding:8px 12px;border:1px solid var(--border);border-radius:4px;font-size:.68rem;color:var(--gold);text-decoration:none;text-align:center;transition:.2s}
.m-doc-btn:hover{background:rgba(201,169,110,.1);border-color:rgba(201,169,110,.5)}
.m-doc-btn.missing{color:var(--muted);border-color:rgba(255,255,255,.08);pointer-events:none}

/* Office use section */
.office-box{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px;padding:20px}
.office-box h4{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.o-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.o-row.c1{grid-template-columns:1fr}
.of label{display:block;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.of input,.of select,.of textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);padding:9px 12px;color:var(--text);font-family:'Jost',sans-serif;font-size:.82rem;border-radius:4px;outline:none;transition:.2s}
.of input:focus,.of select:focus,.of textarea:focus{border-color:rgba(201,169,110,.6)}
.of select option{background:#0f2318}
.of textarea{min-height:70px;resize:vertical}
.btn-save-hr{padding:10px 24px;background:var(--gold);color:#0f2318;font-family:'Jost',sans-serif;font-size:.75rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;border:none;border-radius:4px;cursor:pointer;margin-top:4px}
.btn-save-hr:hover{opacity:.88}
.btn-delete-rec{padding:10px 20px;background:none;border:1px solid rgba(224,112,112,.5);color:#e07070;font-family:'Jost',sans-serif;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;border-radius:4px;cursor:pointer;margin-top:4px;margin-left:10px;transition:.2s}
.btn-delete-rec:hover{background:rgba(224,112,112,.1);border-color:#e07070}

.bc-del-btn{background:none;border:1px solid rgba(224,112,112,.4);color:#e07070;border-radius:4px;padding:4px 8px;font-size:.8rem;cursor:pointer;transition:.2s;line-height:1}
.bc-del-btn:hover{background:rgba(224,112,112,.15);border-color:#e07070}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-size:.85rem}
</style>
</head>
<body>
<div class="sb-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="sb-brand"><div class="sb-brand-name">Eden 54</div><div class="sb-brand-sub">Staff Portal</div></div>
  <nav class="sb-nav" id="sbNav"></nav>
  <div class="sb-foot"><div id="sidebarUser"></div><a class="sb-item" onclick="switchProfile()" style="cursor:pointer"><i class="sb-icon">🔄</i> Switch Profile</a></div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="hamburger" onclick="toggleSidebar()"><div></div><div></div><div></div></button>
      <h1>Background Checks</h1>
    </div>
    <div class="topbar-date" id="topDate"></div>
  </div>
  <div class="content">
    <div id="alertBox" class="alert"></div>

    <!-- Stats row -->
    <div class="g4" style="margin-bottom:20px" id="statsRow">
      <div class="card" style="padding:16px 20px">
        <div class="card-label">Total Submissions</div>
        <div class="card-value" id="statTotal">—</div>
      </div>
      <div class="card" style="padding:16px 20px">
        <div class="card-label">Pending Review</div>
        <div class="card-value gold" id="statPending">—</div>
      </div>
      <div class="card" style="padding:16px 20px">
        <div class="card-label">Approved</div>
        <div class="card-value" style="color:#5a9e6f" id="statApproved">—</div>
      </div>
      <div class="card" style="padding:16px 20px">
        <div class="card-label">Rejected</div>
        <div class="card-value" style="color:#e07070" id="statRejected">—</div>
      </div>
    </div>

    <!-- Filters + list -->
    <div class="card">
      <div class="section-head" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
        <h2>Submissions</h2>
        <a href="/background-check/" target="_blank" style="font-size:.72rem;color:var(--gold);text-decoration:none;border:1px solid rgba(201,169,110,.3);padding:6px 14px;border-radius:4px">
          🔗 Copy Form Link
        </a>
      </div>

      <div class="bc-filters">
        <button class="bc-tab active" onclick="setFilter('all',this)">All</button>
        <button class="bc-tab" onclick="setFilter('pending',this)">Pending</button>
        <button class="bc-tab" onclick="setFilter('review',this)">Under Review</button>
        <button class="bc-tab" onclick="setFilter('approved',this)">Approved</button>
        <button class="bc-tab" onclick="setFilter('rejected',this)">Rejected</button>
      </div>

      <div id="bcList"><div class="empty-state">Loading submissions…</div></div>
    </div>
  </div>
</div>

<!-- Detail modal -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="modalTitle">Background Check</h3>
      <button class="modal-close" onclick="$('modalBg').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="/portal/firebase-init.js"></script>
<script>
const staff = getStaff(); if (!staff) throw 0;
populateSidebar(staff);
buildNav(staff, 'background-check');
requireAccess(staff, 'background-check');

const _raw = (staff.accessLevel || staff.role || '').toLowerCase().replace(/\s+/g,'');
const _dept = (staff.department || '').toLowerCase();
const canDelete = _raw === 'ceo' || _raw === 'superadmin' || _raw === 'manager'
                || _raw === 'hr' || _dept === 'hr' || _dept.includes('human resource');

/* Date header */
const $ = id => document.getElementById(id);
$('topDate').textContent = new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});

let allDocs = [];
let curFilter = 'all';

/* ── Load all submissions ── */
db.collection('backgroundChecks').orderBy('submittedAt','desc').onSnapshot(snap => {
  allDocs = snap.docs.map(d => ({id:d.id,...d.data()}));
  renderStats();
  renderList();

  /* Auto-open from URL param */
  const qs = new URLSearchParams(location.search);
  const targetId = qs.get('id');
  if (targetId) {
    const doc = allDocs.find(d => d.id === targetId || d.refId === targetId);
    if (doc) openModal(doc);
  }
}, () => {});

function renderStats() {
  $('statTotal').textContent    = allDocs.length;
  $('statPending').textContent  = allDocs.filter(d => d.status === 'pending').length;
  $('statApproved').textContent = allDocs.filter(d => d.status === 'approved').length;
  $('statRejected').textContent = allDocs.filter(d => d.status === 'rejected').length;
}

function setFilter(f, btn) {
  curFilter = f;
  document.querySelectorAll('.bc-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const list = curFilter === 'all' ? allDocs : allDocs.filter(d => d.status === curFilter);
  const el = $('bcList');
  if (!list.length) { el.innerHTML = '<div class="empty-state">No submissions found.</div>'; return; }

  el.innerHTML = list.map(d => {
    const initials = (d.fullName||'?').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
    const date = d.submittedAt ? new Date(d.submittedAt.seconds*1000).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : 'Unknown date';
    const stClass = {pending:'st-pending',review:'st-review',approved:'st-approved',rejected:'st-rejected'}[d.status]||'st-pending';
    const stLabel = {pending:'Pending',review:'Under Review',approved:'Approved',rejected:'Rejected'}[d.status]||d.status;
    const docs = [
      d.idUrl && {label:'Govt ID', url:d.idUrl},
      d.passportPhotoUrl && {label:'Passport Photo', url:d.passportPhotoUrl},
      d.addressProofUrl && {label:'Address Proof', url:d.addressProofUrl},
      d.policeUrl && {label:'Police Cert', url:d.policeUrl},
    ].filter(Boolean);

    return `<div class="bc-card" onclick="openById('${d.id}')">
      <div class="bc-card-top">
        <div class="bc-initials">${initials}</div>
        <div class="bc-card-info">
          <div class="bc-name">${esc(d.fullName||'Unknown')}</div>
          <div class="bc-meta">
            ${esc(d.position||'—')} &nbsp;·&nbsp; 📱 ${esc(d.phone||'—')} &nbsp;·&nbsp; 🗓 ${date}
            ${d.bvn ? ' &nbsp;·&nbsp; BVN: '+esc(d.bvn) : ''}
          </div>
          ${docs.length ? '<div class="bc-docs">'+docs.map(x=>`<a href="${x.url}" target="_blank" onclick="event.stopPropagation()" class="doc-link">📎 ${x.label}</a>`).join('')+'</div>' : ''}
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          <span class="bc-status ${stClass}">${stLabel}</span>
          ${canDelete ? `<button class="bc-del-btn" title="Delete record" onclick="event.stopPropagation();deleteRecord('${d.id}','${esc(d.fullName||'this record')}')">🗑</button>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function row(k,v) { return `<div class="m-row"><span class="m-k">${k}</span><span class="m-v">${esc(v||'—')}</span></div>`; }
function docBtn(label, url) {
  return url
    ? `<a href="${url}" target="_blank" class="m-doc-btn">📄 ${label}</a>`
    : `<span class="m-doc-btn missing">— ${label}</span>`;
}

function openById(id) { const d = allDocs.find(x=>x.id===id); if(d) openModal(d); }

function openModal(d) {
  $('modalTitle').textContent = (d.fullName||'Unknown') + ' — ' + (d.position||'');
  const g = d.guarantors||[];
  const e = d.employers||[];
  const g1 = g[0]||{}; const g2 = g[1]||{};
  const e1 = e[0]||{}; const e2 = e[1]||{};
  const stClass = {pending:'st-pending',review:'st-review',approved:'st-approved',rejected:'st-rejected'}[d.status]||'st-pending';
  const stLabel = {pending:'Pending',review:'Under Review',approved:'Approved',rejected:'Rejected'}[d.status]||d.status;
  const refDate = d.submittedAt ? new Date(d.submittedAt.seconds*1000).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}) : '—';

  $('modalBody').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div style="font-size:.7rem;color:var(--muted)">Ref: ${esc(d.refId||d.id||'—').toUpperCase()} &nbsp;·&nbsp; Submitted: ${refDate}</div>
      <span class="bc-status ${stClass}" style="font-size:.65rem">${stLabel}</span>
    </div>

    <div class="m-sec">
      <div class="m-sec-title">1. Applicant Personal Information</div>
      ${row('Full Name', d.fullName)} ${row('Date of Birth', d.dob)} ${row('Gender', d.gender)}
      ${row('Marital Status', d.marital)} ${row('Phone', d.phone)} ${row('Email', d.email)}
      ${row('Home Address', d.address)} ${row('State / LGA', (d.stateOfOrigin||'')+(d.lga?' · '+d.lga:''))}
      ${row('Position Applied', d.position)} ${row('Date of Application', d.dateOfApplication)}
    </div>

    <div class="m-sec">
      <div class="m-sec-title">2. Government ID &amp; Documents</div>
      ${row('ID Type', d.idType)} ${row('ID Number', d.idNumber)} ${row('BVN', d.bvn)}
      ${row('Address Proof Type', d.addressProofType)} ${row('Address Proof Date', d.addressProofDate)}
      ${row('Police Cert No.', d.policeCertNumber)} ${row('Police Cert Date', d.policeCertDate)}
      ${row('Issuing Station', d.policeStation)}
      ${d.policeCertExpected ? row('Cert Expected By', d.policeCertExpected) : ''}
      <div style="margin-top:10px">
        <div style="font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px">Uploaded Documents</div>
        <div class="m-doc-grid">
          ${docBtn('Government ID', d.idUrl)}
          ${docBtn('Passport Photo', d.passportPhotoUrl)}
          ${docBtn('Address Proof', d.addressProofUrl)}
          ${docBtn('Police Certificate', d.policeUrl)}
          ${docBtn('Guarantor 1 ID', g1.idUrl)}
          ${docBtn('Guarantor 2 ID', g2.idUrl)}
        </div>
      </div>
    </div>

    <div class="m-sec">
      <div class="m-sec-title">3. Guarantors</div>
      <div style="font-size:.65rem;color:var(--gold);margin-bottom:6px">Guarantor 1</div>
      ${row('Name', g1.name)} ${row('Relationship', g1.relationship)} ${row('Phone', g1.phone)}
      ${row('Email', g1.email)} ${row('Address', g1.address)} ${row('Occupation', g1.occupation)}
      ${row('ID Type & Number', (g1.idType||'') + ' — ' + (g1.idNumber||''))}
      <div style="font-size:.65rem;color:var(--gold);margin:12px 0 6px">Guarantor 2</div>
      ${row('Name', g2.name)} ${row('Relationship', g2.relationship)} ${row('Phone', g2.phone)}
      ${row('Email', g2.email)} ${row('Address', g2.address)} ${row('Occupation', g2.occupation)}
      ${row('ID Type & Number', (g2.idType||'') + ' — ' + (g2.idNumber||''))}
    </div>

    <div class="m-sec">
      <div class="m-sec-title">4 &amp; 5. Employment References</div>
      <div style="font-size:.65rem;color:var(--gold);margin-bottom:6px">Reference #1</div>
      ${row('Company', e1.company)} ${row('Contact Person', e1.contact)} ${row('Phone', e1.phone)}
      ${row('Email', e1.email)} ${row('Role Held', e1.title)}
      ${row('Dates', (e1.from||'') + ' → ' + (e1.to||''))} ${row('Reason for Leaving', e1.reason)}
      ${e2.company ? `
        <div style="font-size:.65rem;color:var(--gold);margin:12px 0 6px">Reference #2</div>
        ${row('Company', e2.company)} ${row('Contact Person', e2.contact)} ${row('Phone', e2.phone)}
        ${row('Email', e2.email)} ${row('Role Held', e2.title)}
        ${row('Dates', (e2.from||'') + ' → ' + (e2.to||''))} ${row('Reason for Leaving', e2.reason)}
      ` : ''}
    </div>

    <div class="m-sec">
      <div class="m-sec-title">8. Declaration</div>
      ${row('Signature', d.signature)}
    </div>

    <!-- For Office Use Only -->
    <div class="office-box" id="officeBox_${d.id}">
      <h4>For Office Use Only</h4>
      <div class="o-row">
        <div class="of"><label>Status</label>
          <select id="hr_status_${d.id}">
            <option value="pending" ${d.status==='pending'?'selected':''}>Pending</option>
            <option value="review"  ${d.status==='review'?'selected':''}>Under Review</option>
            <option value="approved" ${d.status==='approved'?'selected':''}>Approved</option>
            <option value="rejected" ${d.status==='rejected'?'selected':''}>Rejected</option>
          </select>
        </div>
        <div class="of"><label>Final HR Decision</label>
          <select id="hr_decision_${d.id}">
            <option value="">Select</option>
            <option value="Cleared to proceed" ${d.hrDecision==='Cleared to proceed'?'selected':''}>Cleared to proceed</option>
            <option value="Further verification needed" ${d.hrDecision==='Further verification needed'?'selected':''}>Further verification needed</option>
            <option value="Do not hire" ${d.hrDecision==='Do not hire'?'selected':''}>Do not hire</option>
          </select>
        </div>
      </div>
      <div class="o-row">
        <div class="of"><label>ID Verified By</label>
          <input type="text" id="hr_idverify_${d.id}" value="${esc(d.idVerifiedBy||'')}" placeholder="Staff name who verified ID">
        </div>
        <div class="of"><label>Reference Checks Completed By</label>
          <input type="text" id="hr_refcheck_${d.id}" value="${esc(d.refChecksBy||'')}" placeholder="Staff name who called references">
        </div>
      </div>
      <div class="o-row">
        <div class="of"><label>Police Certificate Verified</label>
          <select id="hr_police_${d.id}">
            <option value=""   ${!d.policeVerified?'selected':''}>Not yet verified</option>
            <option value="yes" ${d.policeVerified===true||d.policeVerified==='yes'?'selected':''}>Yes — verified</option>
            <option value="pending" ${d.policeVerified==='pending'?'selected':''}>Pending submission</option>
          </select>
        </div>
        <div class="of"><label>Date Filed</label>
          <input type="text" value="${d.dateOfApplication||refDate}" readonly style="opacity:.6">
        </div>
      </div>
      <div class="o-row c1">
        <div class="of"><label>HR Notes</label>
          <textarea id="hr_notes_${d.id}" placeholder="Internal notes, call outcomes, observations…">${esc(d.hrNotes||'')}</textarea>
        </div>
      </div>
      <div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-top:8px">
        <button class="btn-save-hr" onclick="saveHR('${d.id}')">Save Office Record</button>
        ${canDelete ? `<button class="btn-delete-rec" onclick="deleteRecord('${d.id}','${esc(d.fullName||'this record')}')">Delete Record</button>` : ''}
      </div>
    </div>`;

  $('modalBg').classList.add('open');
}

async function saveHR(id) {
  try {
    await db.collection('backgroundChecks').doc(id).update({
      status:       $('hr_status_'+id).value,
      hrDecision:   $('hr_decision_'+id).value,
      idVerifiedBy: $('hr_idverify_'+id).value,
      refChecksBy:  $('hr_refcheck_'+id).value,
      policeVerified: $('hr_police_'+id).value,
      hrNotes:      $('hr_notes_'+id).value,
      hrUpdatedAt:  firebase.firestore.FieldValue.serverTimestamp(),
    });
    showAlert('alertBox', 'Office record updated ✓', 'alert-success');
  } catch(e) {
    showAlert('alertBox', 'Update failed: '+e.message, 'alert-error');
  }
}

async function deleteRecord(id, name) {
  if (!confirm(`Delete background check for ${name}?\n\nThis cannot be undone.`)) return;
  try {
    await db.collection('backgroundChecks').doc(id).delete();
    $('modalBg').classList.remove('open');
    showAlert('alertBox', 'Record deleted.', 'alert-success');
  } catch(e) {
    showAlert('alertBox', 'Delete failed: '+e.message, 'alert-error');
  }
}

function closeModal(e) { if (e.target === $('modalBg')) $('modalBg').classList.remove('open'); }

/* Copy form link button */
document.querySelector('[href="/background-check/"]').addEventListener('click', function(e) {
  e.preventDefault();
  navigator.clipboard.writeText('https://eden54group.com/background-check/').then(() => {

  });

</script>
